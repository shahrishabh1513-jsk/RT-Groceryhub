<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - RT Groceryhub</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.13/dist/full.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="styles/style.css">
</head>
<body class="bg-gradient-to-br from-[#F0E7D5] to-[#e8ddc8]">
    <div id="pageTransition" class="fixed inset-0 bg-[#212842] z-50 flex items-center justify-center transition-transform duration-500 transform translate-y-full">
        <div class="text-center"><div class="spinner mb-4"></div><p class="text-white text-xl">Processing...</p></div>
    </div>

    <header class="bg-[#212842] text-white py-4">
        <div class="container mx-auto px-4">
            <a href="index.html" class="text-2xl font-bold flex items-center gap-2" data-link>
                <img src="images/logo.png" alt="Logo" class="w-10 h-10 rounded-full">
                RT Groceryhub
            </a>
        </div>
    </header>

    <section class="container mx-auto px-4 py-12">
        <h1 class="text-4xl font-bold text-[#212842] mb-8 text-center" data-aos="fade-down">Checkout</h1>
        
        <div class="flex flex-col lg:flex-row gap-8">
            <div class="lg:w-2/3">
                <div class="bg-white rounded-2xl shadow-xl p-6 mb-6" data-aos="fade-right">
                    <h2 class="text-2xl font-bold mb-4 text-[#212842]">Delivery Address</h2>
                    <form id="checkoutForm" class="space-y-4">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <input type="text" id="fullName" placeholder="Full Name" required class="border rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-[#212842]">
                            <input type="tel" id="phone" placeholder="Phone Number" required class="border rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-[#212842]">
                            <input type="email" id="email" placeholder="Email Address" required class="border rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-[#212842] md:col-span-2">
                            <input type="text" id="addressLine1" placeholder="Address Line 1" required class="border rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-[#212842] md:col-span-2">
                            <input type="text" id="addressLine2" placeholder="Address Line 2 (Optional)" class="border rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-[#212842] md:col-span-2">
                            <input type="text" id="city" placeholder="City" required class="border rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-[#212842]">
                            <input type="text" id="pincode" placeholder="Pincode" required class="border rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-[#212842]">
                            <select id="state" required class="border rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-[#212842]">
                                <option value="">Select State</option>
                                <option>Maharashtra</option><option>Delhi</option><option>Karnataka</option>
                                <option>Tamil Nadu</option><option>West Bengal</option><option>Gujarat</option>
                                <option>Uttar Pradesh</option><option>Rajasthan</option><option>Punjab</option>
                                <option>Haryana</option><option>Kerala</option><option>Telangana</option>
                            </select>
                        </div>
                    </form>
                </div>
                
                <div class="bg-white rounded-2xl shadow-xl p-6" data-aos="fade-right" data-aos-delay="100">
                    <h2 class="text-2xl font-bold mb-4 text-[#212842]">Payment Method</h2>
                    <div class="space-y-3">
                        <label class="flex items-center gap-3 p-4 border rounded-xl cursor-pointer hover:bg-gray-50 transition-all">
                            <input type="radio" name="payment" value="cod" checked> 
                            <i class="fas fa-money-bill-wave text-2xl text-green-600"></i>
                            <span class="font-medium">Cash on Delivery</span>
                        </label>
                        <label class="flex items-center gap-3 p-4 border rounded-xl cursor-pointer hover:bg-gray-50 transition-all">
                            <input type="radio" name="payment" value="card"> 
                            <i class="fab fa-cc-visa text-2xl text-blue-600"></i>
                            <span class="font-medium">Credit/Debit Card</span>
                        </label>
                        <label class="flex items-center gap-3 p-4 border rounded-xl cursor-pointer hover:bg-gray-50 transition-all">
                            <input type="radio" name="payment" value="upi"> 
                            <i class="fas fa-mobile-alt text-2xl text-purple-600"></i>
                            <span class="font-medium">UPI (Google Pay, PhonePe, etc.)</span>
                        </label>
                    </div>
                </div>
            </div>
            
            <div class="lg:w-1/3">
                <div class="bg-white rounded-2xl shadow-xl p-6 sticky top-24" data-aos="fade-left">
                    <h2 class="text-2xl font-bold mb-4 text-[#212842]">Your Order</h2>
                    <div id="orderItems" class="max-h-64 overflow-y-auto space-y-3 mb-4">
                        <!-- Order items loaded here -->
                    </div>
                    <div class="border-t pt-4 space-y-2">
                        <div class="flex justify-between text-gray-600"><span>Subtotal:</span><span id="checkoutSubtotal">₹0.00</span></div>
                        <div class="flex justify-between text-gray-600"><span>Delivery:</span><span id="checkoutDelivery">₹0.00</span></div>
                        <div class="flex justify-between text-green-600"><span>Discount:</span><span id="checkoutDiscount">₹0.00</span></div>
                        <div class="flex justify-between font-bold text-xl pt-2 border-t"><span>Total:</span><span id="checkoutTotal" class="text-[#212842]">₹0.00</span></div>
                    </div>
                    <button id="placeOrderBtn" class="btn bg-[#212842] text-white w-full mt-6 py-3 rounded-xl hover:bg-[#3a4770] transition-all text-lg">Place Order</button>
                </div>
            </div>
        </div>
    </section>

    <script src="js/main.js"></script>
</body>
</html>
