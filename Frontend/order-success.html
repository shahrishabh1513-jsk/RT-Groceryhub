<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Success - RT Groceryhub</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.13/dist/full.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link rel="stylesheet" href="styles/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body class="bg-gradient-to-br from-[#F0E7D5] to-[#e8ddc8]">
    <div class="container mx-auto px-4 py-12 max-w-4xl">
        <div class="text-center mb-8 animate-bounce-in">
            <div class="w-24 h-24 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-check-circle text-5xl text-green-600"></i>
            </div>
            <h1 class="text-3xl font-bold text-[#212842] mb-2">Order Placed Successfully!</h1>
            <p class="text-gray-600">Thank you for shopping with RT Groceryhub</p>
        </div>
        
        <div id="billContainer" class="bg-white rounded-2xl shadow-xl p-8 mb-6">
            <div id="billContent">
                <!-- Bill content loaded dynamically -->
            </div>
        </div>
        
        <div class="flex flex-wrap gap-4 justify-center">
            <button id="downloadBillBtn" class="bg-[#212842] text-white px-6 py-3 rounded-xl hover:bg-[#3a4770] transition-all flex items-center gap-2">
                <i class="fas fa-download"></i> Download Bill (PDF)
            </button>
            <button id="printBillBtn" class="bg-green-600 text-white px-6 py-3 rounded-xl hover:bg-green-700 transition-all flex items-center gap-2">
                <i class="fas fa-print"></i> Print Bill
            </button>
            <a href="shop.html" class="bg-[#F0E7D5] text-[#212842] px-6 py-3 rounded-xl hover:bg-[#e0d4be] transition-all flex items-center gap-2 border border-[#212842]" data-link>
                <i class="fas fa-shopping-bag"></i> Continue Shopping
            </a>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
