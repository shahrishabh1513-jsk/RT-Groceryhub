<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - RT GroceryHub</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        .contact-header {
            background: linear-gradient(135deg, var(--primary-green-dark), var(--primary-green));
            padding: 3rem 0;
            text-align: center;
            color: white;
        }
        .contact-wrapper {
            padding: 4rem 0;
        }
        .contact-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3rem;
        }
        .contact-info {
            background: var(--bg-card);
            padding: 2rem;
            border-radius: var(--border-radius-lg);
            box-shadow: var(--shadow-sm);
        }
        .contact-item {
            display: flex;
            align-items: center;
            gap: 1.2rem;
            padding: 1rem 0;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        .contact-icon {
            width: 50px;
            height: 50px;
            background: rgba(255,140,66,0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .contact-icon i {
            font-size: 1.5rem;
            color: var(--accent-orange);
        }
        .contact-detail h4 {
            margin-bottom: 0.3rem;
            color: var(--text-dark);
        }
        .contact-detail p {
            color: var(--text-muted);
        }
        .contact-form {
            background: var(--bg-card);
            padding: 2rem;
            border-radius: var(--border-radius-lg);
            box-shadow: var(--shadow-sm);
        }
        .map-container {
            margin-top: 3rem;
            border-radius: var(--border-radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow-md);
        }
        @media (max-width: 768px) {
            .contact-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div id="header-placeholder"></div>

    <main>
        <section class="contact-header" data-aos="fade-down">
            <div class="container">
                <h1><i class="fas fa-headset"></i> Contact Us</h1>
                <p>We'd love to hear from you! Get in touch with our support team</p>
            </div>
        </section>

        <div class="container">
            <div class="contact-wrapper">
                <div class="contact-grid">
                    <div class="contact-info" data-aos="fade-right">
                        <h2 style="color: var(--primary-green-dark); margin-bottom: 1.5rem;"><i class="fas fa-address-card"></i> Get in Touch</h2>
                        <div class="contact-item">
                            <div class="contact-icon"><i class="fas fa-phone-alt"></i></div>
                            <div class="contact-detail"><h4>Phone</h4><p>+91 98765 43210</p><p>Mon-Sat, 9AM - 8PM</p></div>
                        </div>
                        <div class="contact-item">
                            <div class="contact-icon"><i class="fas fa-envelope"></i></div>
                            <div class="contact-detail"><h4>Email</h4><p>support@rtgroceryhub.com</p><p>careers@rtgroceryhub.com</p></div>
                        </div>
                        <div class="contact-item">
                            <div class="contact-icon"><i class="fas fa-map-marker-alt"></i></div>
                            <div class="contact-detail"><h4>Office Address</h4><p>123, Food Street, Andheri East,<br>Mumbai - 400093, India</p></div>
                        </div>
                        <div class="social-links" style="margin-top: 1.5rem; justify-content: flex-start;">
                            <a href="#" style="background: var(--primary-green);"><i class="fab fa-facebook-f"></i></a>
                            <a href="#" style="background: var(--primary-green);"><i class="fab fa-instagram"></i></a>
                            <a href="#" style="background: var(--primary-green);"><i class="fab fa-twitter"></i></a>
                            <a href="#" style="background: var(--primary-green);"><i class="fab fa-whatsapp"></i></a>
                        </div>
                    </div>

                    <div class="contact-form" data-aos="fade-left">
                        <h2 style="color: var(--primary-green-dark); margin-bottom: 1.5rem;"><i class="fas fa-paper-plane"></i> Send us a Message</h2>
                        <form id="contact-form">
                            <div class="form-group">
                                <label>Your Name</label>
                                <input type="text" id="contact-name" placeholder="Enter your name" required>
                            </div>
                            <div class="form-group">
                                <label>Email Address</label>
                                <input type="email" id="contact-email" placeholder="your@email.com" required>
                            </div>
                            <div class="form-group">
                                <label>Subject</label>
                                <input type="text" id="contact-subject" placeholder="What is this regarding?">
                            </div>
                            <div class="form-group">
                                <label>Message</label>
                                <textarea id="contact-message" rows="5" placeholder="Tell us how we can help..." required></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary ripple" style="width: 100%; justify-content: center;">
                                <i class="fas fa-paper-plane"></i> Send Message
                            </button>
                        </form>
                    </div>
                </div>

                <div class="map-container" data-aos="zoom-in">
                    <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3770.937357552811!2d72.847250!3d19.076090!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3be7c9b4c5b5b5b5%3A0x5b5b5b5b5b5b5b5b!2sMumbai!5e0!3m2!1sen!2sin!4v1234567890" width="100%" height="300" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
