<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart - RT GroceryHub</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        .cart-header {
            background: linear-gradient(135deg, var(--primary-green-dark), var(--primary-green));
            padding: 3rem 0;
            text-align: center;
            color: white;
            position: relative;
            overflow: hidden;
        }
        .cart-header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1), transparent);
            animation: rotate 20s linear infinite;
        }
        .cart-container {
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 2rem;
            padding: 3rem 0;
        }
        .cart-items {
            background: var(--bg-card);
            border-radius: var(--border-radius-lg);
            padding: 1.5rem;
            box-shadow: var(--shadow-sm);
        }
        .cart-item {
            display: grid;
            grid-template-columns: 100px 1fr auto auto;
            gap: 1rem;
            align-items: center;
            padding: 1rem 0;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            animation: slideIn 0.3s ease;
        }
        .cart-item img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: var(--border-radius);
        }
        .cart-item h4 {
            margin-bottom: 0.3rem;
            color: var(--text-dark);
        }
        .cart-item-price {
            color: var(--accent-orange);
            font-weight: 700;
        }
        .quantity-controls {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .quantity-btn {
            width: 32px;
            height: 32px;
            border: 1px solid #e0e0e0;
            background: var(--bg-primary);
            border-radius: 50%;
            cursor: pointer;
            transition: var(--transition);
        }
        .quantity-btn:hover {
            background: var(--accent-orange);
            color: white;
            border-color: var(--accent-orange);
        }
        .remove-btn {
            background: none;
            border: none;
            color: #e74c3c;
            cursor: pointer;
            font-size: 1.2rem;
            transition: var(--transition);
        }
        .remove-btn:hover {
            transform: scale(1.1);
        }
        .cart-summary {
            background: var(--bg-card);
            border-radius: var(--border-radius-lg);
            padding: 1.8rem;
            position: sticky;
            top: 100px;
            box-shadow: var(--shadow-sm);
        }
        .summary-row {
            display: flex;
            justify-content: space-between;
            padding: 0.8rem 0;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        .summary-total {
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--accent-orange);
            border-bottom: none;
            padding-top: 1rem;
        }
        .coupon-section {
            margin: 1rem 0;
            display: flex;
            gap: 0.5rem;
        }
        .coupon-section input {
            flex: 1;
            padding: 12px;
            border: 1px solid #e0e0e0;
            border-radius: var(--border-radius);
        }
        .empty-cart {
            text-align: center;
            padding: 4rem;
        }
        .empty-cart i {
            font-size: 5rem;
            color: var(--text-muted);
            margin-bottom: 1rem;
        }
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        @media (max-width: 768px) {
            .cart-container {
                grid-template-columns: 1fr;
            }
            .cart-item {
                grid-template-columns: 70px 1fr;
                gap: 0.8rem;
            }
            .cart-item .quantity-controls {
                grid-column: span 2;
                justify-content: flex-start;
            }
        }
    </style>
</head>
<body>
    <div id="header-placeholder"></div>

    <main>
        <section class="cart-header" data-aos="fade-down">
            <div class="container">
                <h1><i class="fas fa-shopping-cart"></i> Your Shopping Cart</h1>
                <p>Review your items and proceed to checkout</p>
            </div>
        </section>

        <div class="container">
            <div class="cart-container">
                <div class="cart-items" data-aos="fade-right">
                    <h2 style="margin-bottom: 1.5rem; color: var(--primary-green-dark);"><i class="fas fa-box"></i> Cart Items</h2>
                    <div id="cart-items-container"></div>
                </div>
                
                <div class="cart-summary" data-aos="fade-left">
                    <h3 style="margin-bottom: 1.5rem; color: var(--primary-green-dark);"><i class="fas fa-receipt"></i> Order Summary</h3>
                    <div class="summary-row">
                        <span>Subtotal</span>
                        <span id="cart-subtotal">₹0</span>
                    </div>
                    <div class="summary-row">
                        <span>Delivery Fee</span>
                        <span>₹40</span>
                    </div>
                    <div class="coupon-section">
                        <input type="text" id="coupon-code" placeholder="Coupon Code">
                        <button class="btn btn-outline" onclick="applyCoupon()" style="padding: 12px 20px;">Apply</button>
                    </div>
                    <div class="summary-row summary-total">
                        <span>Total Amount</span>
                        <span id="cart-total">₹0</span>
                    </div>
                    <a href="checkout.html" class="btn btn-primary" style="width: 100%; justify-content: center; margin-top: 1.5rem;">
                        <i class="fas fa-credit-card"></i> Proceed to Checkout
                    </a>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
