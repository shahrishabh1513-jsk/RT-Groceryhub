<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart - RT GroceryHub</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/components.css">
    <link rel="stylesheet" href="assets/css/responsive.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        .cart-container {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 2rem;
            padding: 3rem 0;
        }
        .cart-items {
            background: white;
            border-radius: var(--border-radius-lg);
            padding: 1.5rem;
        }
        .cart-item {
            display: grid;
            grid-template-columns: 100px 1fr auto auto;
            gap: 1rem;
            align-items: center;
            padding: 1rem 0;
            border-bottom: 1px solid #eee;
        }
        .cart-item img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 8px;
        }
        .cart-summary {
            background: white;
            border-radius: var(--border-radius-lg);
            padding: 1.5rem;
            height: fit-content;
            position: sticky;
            top: 100px;
        }
        .summary-row {
            display: flex;
            justify-content: space-between;
            padding: 0.8rem 0;
            border-bottom: 1px solid #eee;
        }
        .summary-total {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--accent);
        }
        .coupon-input {
            display: flex;
            gap: 0.5rem;
            margin: 1rem 0;
        }
        .coupon-input input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        @media (max-width: 768px) {
            .cart-container {
                grid-template-columns: 1fr;
            }
            .cart-item {
                grid-template-columns: 70px 1fr;
                gap: 0.8rem;
            }
            .cart-item .item-subtotal {
                grid-column: span 2;
                text-align: right;
            }
        }
    </style>
</head>
<body>
    <div id="header-placeholder"></div>

    <main>
        <div class="container">
            <div class="cart-container">
                <div class="cart-items">
                    <h2>Shopping Cart</h2>
                    <div id="cart-items-container"></div>
                </div>
                
                <div class="cart-summary">
                    <h3>Order Summary</h3>
                    <div class="summary-row">
                        <span>Subtotal</span>
                        <span id="cart-total-amount">₹0</span>
                    </div>
                    <div class="summary-row">
                        <span>Delivery Fee</span>
                        <span>₹40</span>
                    </div>
                    <div class="coupon-input">
                        <input type="text" placeholder="Coupon code" id="coupon-code">
                        <button class="btn btn-outline" style="padding: 10px 15px;" onclick="applyCoupon()">Apply</button>
                    </div>
                    <div class="summary-row summary-total">
                        <span>Total</span>
                        <span id="final-total">₹0</span>
                    </div>
                    <a href="checkout.html" class="btn btn-primary" style="width: 100%; justify-content: center; margin-top: 1rem;">
                        Proceed to Checkout <i class="fas fa-arrow-right"></i>
                    </a>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="assets/js/main.js"></script>
    <script>
        function renderCartItems() {
            const cartContainer = document.getElementById('cart-items-container');
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            
            if (cart.length === 0) {
                cartContainer.innerHTML = `
                    <div style="text-align: center; padding: 3rem;">
                        <i class="fas fa-shopping-basket" style="font-size: 4rem; color: #ccc;"></i>
                        <p style="margin: 1rem 0;">Your cart is empty</p>
                        <a href="shop.html" class="btn btn-primary">Continue Shopping</a>
                    </div>
                `;
                document.getElementById('cart-total-amount').textContent = '₹0';
                document.getElementById('final-total').textContent = '₹40';
                return;
            }
            
            cartContainer.innerHTML = cart.map(item => `
                <div class="cart-item">
                    <img src="${item.image || 'https://via.placeholder.com/80'}" alt="${item.name}">
                    <div>
                        <h4>${item.name}</h4>
                        <p style="color: var(--accent); font-weight: 600;">₹${item.price}</p>
                    </div>
                    <div class="cart-item-quantity">
                        <button class="quantity-btn" onclick="updateQuantity(${item.id}, -1)">-</button>
                        <span style="margin: 0 10px;">${item.quantity}</span>
                        <button class="quantity-btn" onclick="updateQuantity(${item.id}, 1)">+</button>
                    </div>
                    <div class="item-subtotal" style="font-weight: 600;">₹${item.price * item.quantity}</div>
                </div>
            `).join('');
            
            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            document.getElementById('cart-total-amount').textContent = `₹${total}`;
            document.getElementById('final-total').textContent = `₹${total + 40}`;
        }
        
        function updateQuantity(id, change) {
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            const itemIndex = cart.findIndex(item => item.id === id);
            if (itemIndex !== -1) {
                cart[itemIndex].quantity += change;
                if (cart[itemIndex].quantity <= 0) {
                    cart.splice(itemIndex, 1);
                }
                localStorage.setItem('cart', JSON.stringify(cart));
                renderCartItems();
                updateCartCount();
            }
        }
        
        function applyCoupon() {
            const code = document.getElementById('coupon-code').value;
            if (code === 'SAVE10') {
                alert('Coupon applied! 10% off on your order.');
                const total = parseInt(document.getElementById('cart-total-amount').textContent.replace('₹', ''));
                const discounted = total * 0.9;
                document.getElementById('final-total').textContent = `₹${discounted + 40}`;
            } else {
                alert('Invalid coupon code');
            }
        }
        
        document.addEventListener('DOMContentLoaded', () => {
            renderCartItems();
        });
    </script>
</body>
</html>
