<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - RT GroceryHub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@100..800&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.23/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://kit.fontawesome.com/d18f75e53f.js" crossorigin="anonymous"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .font-sora { font-family: "Sora", serif; }
        .font-poppins { font-family: "Poppins", serif; }
        .cart-item { transition: all 0.3s ease; }
        .cart-item:hover { background-color: #f9fafb; }
        .quantity-btn { transition: all 0.2s ease; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 50%; border: 1px solid #e5e7eb; background: white; cursor: pointer; }
        .quantity-btn:hover { background-color: #16a34a; color: white; border-color: #16a34a; }
        .coupon-input:focus { outline: none; border-color: #16a34a; box-shadow: 0 0 0 3px rgba(22, 163, 74, 0.1); }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
        .cart-item { animation: slideIn 0.3s ease forwards; }
    </style>
    <script> tailwind.config = { theme: { extend: { colors: { 'btn-primary': '#16a34a', 'primary-green': '#179800', 'accent-orange': '#FF8C42' } } } } </script>
</head>

<body class="bg-[#fffffe]">
    <div id="header-placeholder"></div>
    <main>
        <section class="w-full bg-gradient-to-r from-green-700 to-green-500 py-12 lg:py-16 text-white">
            <div class="container mx-auto px-4 lg:px-20 text-center" data-aos="fade-down">
                <h1 class="font-sora text-3xl lg:text-5xl font-bold mb-3"><i class="fas fa-shopping-cart"></i> Your Shopping Cart</h1>
                <p class="font-poppins text-base lg:text-lg">Review your items and proceed to checkout</p>
            </div>
        </section>
        <div class="container mx-auto px-4 lg:px-20 py-12">
            <div class="flex flex-col lg:flex-row gap-8">
                <div class="flex-1" data-aos="fade-right"><div class="bg-white rounded-2xl shadow-sm overflow-hidden"><div class="hidden lg:grid grid-cols-12 gap-4 p-4 bg-gray-50 border-b font-semibold text-gray-600"><div class="col-span-6">Product</div><div class="col-span-2 text-center">Price</div><div class="col-span-2 text-center">Quantity</div><div class="col-span-2 text-right">Total</div></div><div id="cart-items-container" class="divide-y divide-gray-100"></div></div><div class="mt-6"><a href="shop.html" class="inline-flex items-center gap-2 text-green-600 hover:text-green-700 font-semibold"><i class="fas fa-arrow-left"></i> Continue Shopping</a></div></div>
                <div class="lg:w-96" data-aos="fade-left"><div class="bg-white rounded-2xl shadow-sm p-6 sticky top-24"><h2 class="font-sora text-xl font-bold mb-4 pb-3 border-b"><i class="fas fa-receipt text-green-600"></i> Order Summary</h2><div class="flex justify-between py-3"><span>Subtotal</span><span id="cart-subtotal" class="font-semibold">₹0</span></div><div class="flex justify-between py-3 border-b"><span>Delivery Fee</span><span class="font-semibold">₹40</span></div><div class="py-4"><label class="block text-sm font-semibold mb-2"><i class="fas fa-tag"></i> Apply Coupon</label><div class="flex gap-2"><input type="text" id="coupon-code" placeholder="SAVE10 or WELCOME20" class="coupon-input flex-1 p-3 border rounded-lg text-sm"><button onclick="applyCoupon()" class="px-4 py-2 bg-gray-100 rounded-lg hover:bg-green-600 hover:text-white transition">Apply</button></div><div id="coupon-message" class="text-xs mt-2"></div></div><div class="flex justify-between py-3 text-lg font-bold text-orange-600 border-t pt-4"><span>Total Amount</span><span id="cart-total">₹0</span></div><a href="checkout.html" class="btn btn-primary w-full bg-green-600 text-white py-3 rounded-lg font-semibold hover:bg-green-700 transition flex items-center justify-center gap-2 mt-4"><i class="fas fa-credit-card"></i> Proceed to Checkout</a><div class="mt-4 text-center text-xs text-gray-400"><i class="fas fa-lock"></i> Secure Payment</div></div></div>
            </div>
        </div>
        <section class="container mx-auto px-4 lg:px-20 py-12 bg-gray-50 mt-8"><div class="text-center mb-8" data-aos="fade-up"><h2 class="font-sora text-2xl lg:text-3xl font-bold text-gray-800">You Might Also Like</h2><div class="w-20 h-1 bg-green-500 mx-auto mt-2 rounded-full"></div></div><div id="recommended-products" class="grid grid-cols-2 lg:grid-cols-4 gap-4 lg:gap-6"></div></section>
    </main>
    <div id="footer-placeholder"></div>
    <div id="cart-sidebar" class="cart-sidebar"><div class="cart-sidebar-header"><h2 class="text-xl font-bold"><i class="fas fa-shopping-cart"></i> Your Cart</h2><button onclick="toggleCartSidebar()" class="text-2xl">&times;</button></div><div id="cart-sidebar-items" class="cart-sidebar-items"></div><div class="cart-sidebar-footer"><div class="flex justify-between font-bold text-lg mb-4"><span>Total:</span><span id="cart-sidebar-total">₹0</span></div><a href="cart.html" class="btn btn-primary w-full bg-green-600 text-white py-2 rounded-lg text-center block">View Cart</a><a href="checkout.html" class="btn btn-success w-full bg-orange-500 text-white py-2 rounded-lg text-center block mt-2">Checkout</a></div></div>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="assets/js/products.js"></script>
    <script src="assets/js/main.js"></script>
    <script>
        let appliedDiscount = 0, currentCoupon = null;
        function applyCoupon() { const code = document.getElementById('coupon-code').value.trim().toUpperCase(); const msg = document.getElementById('coupon-message'); const subtotal = getCartTotal(); if (!code) { msg.innerHTML = '<span class="text-red-500">Enter a coupon code</span>'; return; } if (code === 'SAVE10') { appliedDiscount = subtotal * 0.1; currentCoupon = 'SAVE10'; msg.innerHTML = '<span class="text-green-600">✓ 10% discount applied!</span>'; updateCartTotals(); } else if (code === 'WELCOME20') { appliedDiscount = subtotal * 0.2; currentCoupon = 'WELCOME20'; msg.innerHTML = '<span class="text-green-600">✓ 20% discount applied!</span>'; updateCartTotals(); } else { msg.innerHTML = '<span class="text-red-500">Invalid coupon. Try SAVE10 or WELCOME20</span>'; } }
        function updateCartTotals() { const subtotal = getCartTotal(); const discounted = subtotal - appliedDiscount; const total = discounted + 40; document.getElementById('cart-subtotal').textContent = `₹${discounted}`; document.getElementById('cart-total').textContent = `₹${total}`; }
        const origRender = window.renderCartPage; window.renderCartPage = function() { if (origRender) origRender(); if (currentCoupon) { const subtotal = getCartTotal(); appliedDiscount = currentCoupon === 'SAVE10' ? subtotal * 0.1 : subtotal * 0.2; updateCartTotals(); } else { const subtotal = getCartTotal(); document.getElementById('cart-subtotal').textContent = `₹${subtotal}`; document.getElementById('cart-total').textContent = `₹${subtotal + 40}`; } };
        function loadRecommended() { const container = document.getElementById('recommended-products'); if (!container || !productsDatabase) return; const shuffled = [...productsDatabase].sort(() => 0.5 - Math.random()); const rec = shuffled.slice(0, 4); container.innerHTML = rec.map(p => `<div class="bg-white rounded-xl overflow-hidden shadow-sm cursor-pointer transition hover:shadow-md" onclick="location.href='product-detail.html?id=${p.id}'"><img src="${p.image}" class="w-full h-36 lg:h-40 object-cover"><div class="p-3"><div class="flex items-center gap-1 text-sm"><i class="fa-solid fa-star text-yellow-500"></i><span>${p.rating}</span></div><h3 class="font-semibold text-sm lg:text-base mt-1 truncate">${p.name}</h3><div class="flex items-center gap-2 mt-1"><span class="text-orange-600 font-bold">₹${p.price}</span>${p.oldPrice ? `<span class="text-gray-400 line-through text-xs">₹${p.oldPrice}</span>` : ''}</div><button onclick="event.stopPropagation(); addToCart(${p.id}, '${p.name}', ${p.price}, '${p.image}')" class="w-full mt-2 bg-green-600 text-white py-1 rounded-lg text-sm hover:bg-green-700 transition">Add to Cart</button></div></div>`).join(''); }
        document.addEventListener('DOMContentLoaded', () => { const check = setInterval(() => { if (typeof productsDatabase !== 'undefined' && productsDatabase.length) { clearInterval(check); loadRecommended(); } }, 100); if (typeof AOS !== 'undefined') AOS.init({ duration: 800, once: true }); });
    </script>
</body>
</html>
