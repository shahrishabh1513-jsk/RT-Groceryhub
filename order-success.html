<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Success - RT GroceryHub</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        .success-container {
            min-height: 60vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4rem 0;
        }
        .success-card {
            background: var(--bg-card);
            border-radius: var(--border-radius-lg);
            padding: 3rem;
            max-width: 550px;
            margin: 0 auto;
            text-align: center;
            box-shadow: var(--shadow-lg);
            animation: float 3s ease-in-out infinite;
        }
        .success-icon {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #28a74520, #28a74510);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
        }
        .success-icon i {
            font-size: 4rem;
            color: #28a745;
            animation: checkmark 0.5s ease-in-out;
        }
        @keyframes checkmark {
            0% { transform: scale(0); opacity: 0; }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); opacity: 1; }
        }
        .order-details-box {
            background: var(--bg-primary);
            padding: 1.5rem;
            border-radius: var(--border-radius);
            margin: 1.5rem 0;
            text-align: left;
        }
        .order-detail-row {
            display: flex;
            justify-content: space-between;
            padding: 0.6rem 0;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        .delivery-timer {
            background: rgba(255,140,66,0.1);
            padding: 1rem;
            border-radius: var(--border-radius);
            margin: 1rem 0;
        }
        .btn-group {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-top: 1.5rem;
        }
        @media (max-width: 480px) {
            .success-card {
                padding: 1.5rem;
            }
            .btn-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div id="header-placeholder"></div>

    <main>
        <div class="container">
            <div class="success-container" data-aos="zoom-in">
                <div class="success-card">
                    <div class="success-icon">
                        <i class="fas fa-check-circle"></i>
                    </div>
                    <h1 style="color: var(--primary-green-dark);">Order Placed Successfully!</h1>
                    <p style="color: var(--text-muted); margin: 0.5rem 0;">Thank you for shopping with RT GroceryHub</p>
                    
                    <div class="order-details-box" id="order-details">
                        <!-- Order details will be inserted here -->
                    </div>
                    
                    <div class="delivery-timer">
                        <i class="fas fa-truck-fast" style="color: var(--accent-orange);"></i>
                        <strong>Estimated Delivery Time: <span id="delivery-time">30-45 minutes</span></strong>
                    </div>
                    
                    <div class="btn-group">
                        <a href="shop.html" class="btn btn-primary"><i class="fas fa-shopping-cart"></i> Continue Shopping</a>
                        <a href="account.html" class="btn btn-outline"><i class="fas fa-history"></i> View Orders</a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
