<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Success - RT GroceryHub</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/components.css">
    <link rel="stylesheet" href="assets/css/responsive.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <main>
        <div class="container" style="padding: 4rem 0; text-align: center;">
            <div style="background: white; border-radius: var(--border-radius-lg); padding: 3rem; max-width: 600px; margin: 0 auto;">
                <div style="width: 80px; height: 80px; background: #28a74520; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem;">
                    <i class="fas fa-check-circle" style="font-size: 3rem; color: #28a745;"></i>
                </div>
                <h1 style="color: var(--navy); margin-bottom: 1rem;">Order Placed Successfully!</h1>
                <p style="color: var(--gray); margin-bottom: 1rem;">Thank you for shopping with RT GroceryHub</p>
                <div id="order-details" style="background: var(--cream); padding: 1.5rem; border-radius: var(--border-radius); margin: 1.5rem 0;">
                    <!-- Order details will be inserted here -->
                </div>
                <p style="margin-bottom: 2rem;">Estimated Delivery Time: <strong>30-45 minutes</strong></p>
                <div style="display: flex; gap: 1rem; justify-content: center;">
                    <a href="shop.html" class="btn btn-primary">Continue Shopping <i class="fas fa-arrow-right"></i></a>
                    <a href="account.html" class="btn btn-outline">View Orders</a>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="assets/js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const lastOrder = JSON.parse(localStorage.getItem('lastOrder'));
            if (lastOrder) {
                document.getElementById('order-details').innerHTML = `
                    <p><strong>Order ID:</strong> ${lastOrder.orderId}</p>
                    <p><strong>Total Amount:</strong> ₹${lastOrder.total}</p>
                    <p><strong>Delivery Address:</strong> ${lastOrder.customer.address}, ${lastOrder.customer.city} - ${lastOrder.customer.pincode}</p>
                    <p><strong>Payment Method:</strong> ${lastOrder.paymentMethod === 'cod' ? 'Cash on Delivery' : 'Card/UPI'}</p>
                `;
                localStorage.removeItem('lastOrder');
            } else {
                document.getElementById('order-details').innerHTML = '<p>No recent order found. <a href="shop.html">Start shopping</a></p>';
            }
        });
    </script>
</body>
</html>
