<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - RT GroceryHub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@100..800&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.23/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://kit.fontawesome.com/d18f75e53f.js" crossorigin="anonymous"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .font-sora { font-family: "Sora", serif; }
        .font-poppins { font-family: "Poppins", serif; }
        .form-input:focus { outline: none; border-color: #16a34a; box-shadow: 0 0 0 3px rgba(22, 163, 74, 0.1); }
        .payment-option { transition: all 0.2s ease; cursor: pointer; }
        .payment-option.selected { border-color: #16a34a; background-color: #f0fdf4; }
        .payment-option:hover { border-color: #16a34a; transform: translateY(-2px); }
        .order-item { animation: fadeInUp 0.3s ease forwards; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
    <script> tailwind.config = { theme: { extend: { colors: { 'btn-primary': '#16a34a', 'primary-green': '#179800', 'accent-orange': '#FF8C42' } } } } </script>
</head>

<body class="bg-[#fffffe]">
    <div id="header-placeholder"></div>
    <main>
        <section class="w-full bg-gradient-to-r from-green-700 to-green-500 py-12 lg:py-16 text-white">
            <div class="container mx-auto px-4 lg:px-20 text-center" data-aos="fade-down">
                <h1 class="font-sora text-3xl lg:text-5xl font-bold mb-3"><i class="fas fa-clipboard-list"></i> Checkout</h1>
                <p class="font-poppins text-base lg:text-lg">Complete your order with delivery details</p>
            </div>
        </section>
        <div class="container mx-auto px-4 lg:px-20 py-12"><div id="checkout-main-content"></div></div>
    </main>
    <div id="footer-placeholder"></div>
    <div id="cart-sidebar" class="cart-sidebar"><div class="cart-sidebar-header"><h2 class="text-xl font-bold"><i class="fas fa-shopping-cart"></i> Your Cart</h2><button onclick="toggleCartSidebar()" class="text-2xl">&times;</button></div><div id="cart-sidebar-items" class="cart-sidebar-items"></div><div class="cart-sidebar-footer"><div class="flex justify-between font-bold text-lg mb-4"><span>Total:</span><span id="cart-sidebar-total">₹0</span></div><a href="cart.html" class="btn btn-primary w-full bg-green-600 text-white py-2 rounded-lg text-center block">View Cart</a><a href="checkout.html" class="btn btn-success w-full bg-orange-500 text-white py-2 rounded-lg text-center block mt-2">Checkout</a></div></div>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="assets/js/products.js"></script>
    <script src="assets/js/main.js"></script>
    <script>
        let checkoutCart = [];
        function getCheckoutCart() { const saved = localStorage.getItem('cart'); return saved && saved !== '[]' ? JSON.parse(saved) : []; }
        function getCheckoutCartTotal() { return checkoutCart.reduce((sum, item) => sum + ((item.price || 0) * (item.quantity || 0)), 0); }
        function showNotification(msg, isErr) { const n = document.createElement('div'); n.className = `fixed bottom-4 right-4 px-6 py-3 rounded-lg shadow-lg z-50 ${isErr ? 'bg-red-500' : 'bg-green-500'} text-white`; n.innerHTML = `<i class="fas ${isErr ? 'fa-exclamation-triangle' : 'fa-check-circle'} mr-2"></i> ${msg}`; document.body.appendChild(n); setTimeout(() => n.remove(), 3000); }
        function loadCheckoutContent() {
            const container = document.getElementById('checkout-main-content');
            checkoutCart = getCheckoutCart();
            if (checkoutCart.length === 0) { container.innerHTML = `<div class="bg-white rounded-2xl shadow-sm p-12 text-center"><i class="fas fa-shopping-cart text-6xl text-gray-300 mb-4"></i><h2 class="text-2xl font-bold text-gray-700 mb-3">Your Cart is Empty!</h2><a href="shop.html" class="inline-block bg-green-600 text-white px-8 py-3 rounded-lg">Continue Shopping</a></div>`; return; }
            container.innerHTML = `<div class="flex flex-col lg:flex-row gap-8"><div class="flex-1" data-aos="fade-right"><form id="checkout-form" class="bg-white rounded-2xl shadow-sm p-6 lg:p-8"><h2 class="font-sora text-xl font-bold mb-4 pb-3 border-b"><i class="fas fa-user text-green-600"></i> Personal Information</h2><div class="grid grid-cols-1 lg:grid-cols-2 gap-4 mb-6"><div><label class="block text-sm font-semibold mb-2">Full Name <span class="text-red-500">*</span></label><input type="text" id="fullname" class="form-input w-full p-3 border rounded-lg focus:border-green-500"></div><div><label class="block text-sm font-semibold mb-2">Phone <span class="text-red-500">*</span></label><input type="tel" id="phone" class="form-input w-full p-3 border rounded-lg focus:border-green-500"></div></div><div class="mb-6"><label class="block text-sm font-semibold mb-2">Email</label><input type="email" id="email" class="form-input w-full p-3 border rounded-lg focus:border-green-500"></div><h2 class="font-sora text-xl font-bold mb-4 pb-3 border-b mt-6"><i class="fas fa-map-marker-alt text-green-600"></i> Delivery Address</h2><div class="mb-4"><label class="block text-sm font-semibold mb-2">Street Address <span class="text-red-500">*</span></label><textarea id="address" rows="2" class="form-input w-full p-3 border rounded-lg focus:border-green-500"></textarea></div><div class="grid grid-cols-1 lg:grid-cols-2 gap-4 mb-4"><div><label class="block text-sm font-semibold mb-2">City <span class="text-red-500">*</span></label><input type="text" id="city" class="form-input w-full p-3 border rounded-lg focus:border-green-500"></div><div><label class="block text-sm font-semibold mb-2">PIN Code <span class="text-red-500">*</span></label><input type="text" id="pincode" class="form-input w-full p-3 border rounded-lg focus:border-green-500"></div></div><div class="mb-4"><label class="block text-sm font-semibold mb-2">Delivery Instructions</label><textarea id="instructions" rows="2" placeholder="Gate code, landmark, etc." class="form-input w-full p-3 border rounded-lg focus:border-green-500"></textarea></div><h2 class="font-sora text-xl font-bold mb-4 pb-3 border-b mt-6"><i class="fas fa-credit-card text-green-600"></i> Payment Method</h2><div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-8"><div class="payment-option border-2 rounded-xl p-4 flex items-center gap-3 selected" data-method="cod"><i class="fas fa-money-bill-wave text-2xl text-green-600"></i><div><p class="font-semibold">Cash on Delivery</p><p class="text-xs text-gray-500">Pay when you receive</p></div><div class="ml-auto"><div class="w-5 h-5 rounded-full border-2 border-green-600 bg-green-600 selected-indicator"></div></div></div><div class="payment-option border-2 rounded-xl p-4 flex items-center gap-3" data-method="card"><i class="fab fa-cc-visa text-2xl text-blue-600"></i><div><p class="font-semibold">Card / UPI</p><p class="text-xs text-gray-500">Credit/Debit Card, UPI</p></div><div class="ml-auto"><div class="w-5 h-5 rounded-full border-2 border-gray-300 selected-indicator"></div></div></div></div><button type="submit" class="w-full bg-green-600 text-white py-3 rounded-lg font-semibold hover:bg-green-700 transition"><i class="fas fa-check-circle"></i> Place Order</button></form></div><div class="lg:w-96" data-aos="fade-left"><div class="bg-white rounded-2xl shadow-sm p-6 sticky top-24"><h2 class="font-sora text-xl font-bold mb-4 pb-3 border-b"><i class="fas fa-shopping-bag text-green-600"></i> Order Summary</h2><div id="order-items-list" class="max-h-80 overflow-y-auto mb-4"></div><div class="border-t pt-4"><div class="flex justify-between py-2"><span>Subtotal</span><span id="order-subtotal">₹0</span></div><div class="flex justify-between py-2"><span>Delivery Fee</span><span>₹40</span></div><div class="flex justify-between py-3 text-xl font-bold text-orange-600 border-t mt-2 pt-3"><span>Total</span><span id="order-total">₹0</span></div></div><div class="mt-4 p-3 bg-gray-50 rounded-lg"><div class="flex items-center gap-2 text-sm mb-2"><i class="fas fa-truck text-green-600"></i><span>Estimated Delivery: 30-45 minutes</span></div></div></div></div></div>`;
            loadOrderItemsCheckout(); setupPaymentSelectionCheckout(); setupCheckoutFormSubmit(); autoFillUserDataCheckout();
        }
        function loadOrderItemsCheckout() { const container = document.getElementById('order-items-list'); if (!container) return; checkoutCart = getCheckoutCart(); if (checkoutCart.length === 0) { container.innerHTML = '<p class="text-center text-gray-500 py-4">No items in cart</p>'; document.getElementById('order-subtotal').textContent = '₹0'; document.getElementById('order-total').textContent = '₹40'; return; } container.innerHTML = checkoutCart.map(item => `<div class="flex justify-between py-2 border-b"><span>${item.name} x ${item.quantity}</span><span>₹${(item.price || 0) * (item.quantity || 0)}</span></div>`).join(''); const subtotal = getCheckoutCartTotal(); document.getElementById('order-subtotal').textContent = `₹${subtotal}`; document.getElementById('order-total').textContent = `₹${subtotal + 40}`; }
        function setupPaymentSelectionCheckout() { document.querySelectorAll('.payment-option').forEach(opt => { opt.addEventListener('click', function() { document.querySelectorAll('.payment-option').forEach(o => { o.classList.remove('selected'); const ind = o.querySelector('.selected-indicator'); if (ind) { ind.classList.remove('bg-green-600', 'border-green-600'); ind.classList.add('border-gray-300'); } }); this.classList.add('selected'); const ind = this.querySelector('.selected-indicator'); if (ind) { ind.classList.add('bg-green-600', 'border-green-600'); ind.classList.remove('border-gray-300'); } }); }); }
        function autoFillUserDataCheckout() { const cu = JSON.parse(localStorage.getItem('currentUser')); if (cu) { if (document.getElementById('fullname') && !document.getElementById('fullname').value) document.getElementById('fullname').value = cu.name || ''; if (document.getElementById('email') && !document.getElementById('email').value) document.getElementById('email').value = cu.email || ''; if (document.getElementById('phone') && !document.getElementById('phone').value) document.getElementById('phone').value = cu.phone || ''; } const saved = JSON.parse(localStorage.getItem('user_addresses')) || []; const userAddrs = saved.filter(a => a.userEmail === cu?.email); const def = userAddrs.find(a => a.isDefault); if (def) { if (document.getElementById('address') && !document.getElementById('address').value) document.getElementById('address').value = def.address || ''; if (document.getElementById('city') && !document.getElementById('city').value) document.getElementById('city').value = def.city || ''; if (document.getElementById('pincode') && !document.getElementById('pincode').value) document.getElementById('pincode').value = def.pincode || ''; } }
        function setupCheckoutFormSubmit() { const form = document.getElementById('checkout-form'); if (!form) return; form.addEventListener('submit', (e) => { e.preventDefault(); checkoutCart = getCheckoutCart(); if (checkoutCart.length === 0) { showNotification('Your cart is empty!', true); window.location.href = 'shop.html'; return; } const fullname = document.getElementById('fullname')?.value.trim(); const phone = document.getElementById('phone')?.value.trim(); const address = document.getElementById('address')?.value.trim(); const city = document.getElementById('city')?.value.trim(); const pincode = document.getElementById('pincode')?.value.trim(); if (!fullname || !phone || !address || !city || !pincode) { showNotification('Please fill all required fields', true); return; } if (!/^\d{10}$/.test(phone)) { showNotification('Enter valid 10-digit phone number', true); return; } const selected = document.querySelector('.payment-option.selected'); const paymentMethod = selected ? (selected.dataset.method === 'cod' ? 'Cash on Delivery' : 'Card/UPI') : 'Cash on Delivery'; const subtotal = getCheckoutCartTotal(); const total = subtotal + 40; const cu = JSON.parse(localStorage.getItem('currentUser')) || {}; const email = document.getElementById('email')?.value.trim() || cu.email || ''; const orderData = { orderId: 'ORD' + Date.now(), customer: { name: fullname, phone: phone, email: email, address: address, city: city, pincode: pincode, instructions: document.getElementById('instructions')?.value || '' }, items: checkoutCart.map(item => ({ id: item.id, name: item.name, price: item.price, quantity: item.quantity, image: item.image })), paymentMethod: paymentMethod, subtotal: subtotal, deliveryFee: 40, total: total, status: 'delivered', orderDate: new Date().toISOString() }; const orders = JSON.parse(localStorage.getItem('orders')) || []; orders.push(orderData); localStorage.setItem('orders', JSON.stringify(orders)); localStorage.setItem('lastOrder', JSON.stringify(orderData)); localStorage.removeItem('cart'); showNotification('Order placed successfully! Redirecting...'); setTimeout(() => { window.location.href = 'order-success.html'; }, 1500); }); }
        document.addEventListener('DOMContentLoaded', () => { loadCheckoutContent(); if (typeof AOS !== 'undefined') AOS.init({ duration: 800, once: true }); });
    </script>
</body>
</html>
