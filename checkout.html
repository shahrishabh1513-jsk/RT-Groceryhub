<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - RT GroceryHub</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        .checkout-header {
            background: linear-gradient(135deg, var(--primary-green-dark), var(--primary-green));
            padding: 2.5rem 0;
            text-align: center;
            color: white;
        }
        .checkout-container {
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 2rem;
            padding: 3rem 0;
        }
        .checkout-form {
            background: var(--bg-card);
            padding: 2rem;
            border-radius: var(--border-radius-lg);
            box-shadow: var(--shadow-sm);
        }
        .form-section {
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        .form-section h3 {
            color: var(--primary-green-dark);
            margin-bottom: 1.2rem;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1rem;
        }
        .form-group {
            margin-bottom: 1rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--text-dark);
        }
        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid #e0e0e0;
            border-radius: var(--border-radius);
            transition: var(--transition);
        }
        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--accent-orange);
            box-shadow: 0 0 0 3px rgba(255,140,66,0.1);
        }
        .payment-options {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .payment-option {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            padding: 0.8rem 1.5rem;
            border: 2px solid #e0e0e0;
            border-radius: 50px;
            cursor: pointer;
            transition: var(--transition);
        }
        .payment-option.selected {
            border-color: var(--accent-orange);
            background: rgba(255,140,66,0.1);
        }
        .payment-option i {
            font-size: 1.2rem;
        }
        .order-summary-card {
            background: var(--bg-card);
            padding: 1.5rem;
            border-radius: var(--border-radius-lg);
            position: sticky;
            top: 100px;
            box-shadow: var(--shadow-sm);
        }
        .order-item {
            display: flex;
            justify-content: space-between;
            padding: 0.6rem 0;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        @media (max-width: 768px) {
            .checkout-container {
                grid-template-columns: 1fr;
            }
            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div id="header-placeholder"></div>

    <main>
        <section class="checkout-header" data-aos="fade-down">
            <div class="container">
                <h1><i class="fas fa-clipboard-list"></i> Checkout</h1>
                <p>Complete your order with delivery details</p>
            </div>
        </section>

        <div class="container">
            <div class="checkout-container">
                <form class="checkout-form" id="checkout-form" data-aos="fade-right">
                    <div class="form-section">
                        <h3><i class="fas fa-user"></i> Personal Information</h3>
                        <div class="form-row">
                            <div class="form-group">
                                <label>Full Name *</label>
                                <input type="text" id="fullname" placeholder="Enter your full name" required>
                            </div>
                            <div class="form-group">
                                <label>Phone Number *</label>
                                <input type="tel" id="phone" placeholder="10-digit mobile number" required>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Email Address</label>
                            <input type="email" id="email" placeholder="your@email.com">
                        </div>
                    </div>

                    <div class="form-section">
                        <h3><i class="fas fa-map-marker-alt"></i> Delivery Address</h3>
                        <div class="form-group">
                            <label>Street Address *</label>
                            <textarea id="address" rows="2" placeholder="House number, building, street" required></textarea>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>City *</label>
                                <input type="text" id="city" placeholder="City" required>
                            </div>
                            <div class="form-group">
                                <label>PIN Code *</label>
                                <input type="text" id="pincode" placeholder="PIN code" required>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Delivery Instructions (Optional)</label>
                            <textarea id="instructions" rows="2" placeholder="Gate code, landmark, etc."></textarea>
                        </div>
                    </div>

                    <div class="form-section">
                        <h3><i class="fas fa-credit-card"></i> Payment Method</h3>
                        <div class="payment-options">
                            <div class="payment-option selected" data-method="cod">
                                <i class="fas fa-money-bill-wave"></i> Cash on Delivery
                            </div>
                            <div class="payment-option" data-method="card">
                                <i class="fab fa-cc-visa"></i> Card / UPI
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary ripple" style="width: 100%; justify-content: center;">
                        <i class="fas fa-check-circle"></i> Place Order
                    </button>
                </form>

                <div class="order-summary-card" data-aos="fade-left">
                    <h3 style="color: var(--primary-green-dark);"><i class="fas fa-shopping-bag"></i> Order Summary</h3>
                    <div id="order-items-list"></div>
                    <div style="margin-top: 1rem; padding-top: 1rem; border-top: 1px solid rgba(0,0,0,0.05);">
                        <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem;">
                            <span>Subtotal</span>
                            <span id="order-subtotal">₹0</span>
                        </div>
                        <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem;">
                            <span>Delivery Fee</span>
                            <span>₹40</span>
                        </div>
                        <div style="display: flex; justify-content: space-between; font-size: 1.2rem; font-weight: 800; color: var(--accent-orange); margin-top: 0.8rem;">
                            <span>Total</span>
                            <span id="order-total">₹0</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
