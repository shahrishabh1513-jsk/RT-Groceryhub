<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop - RT GroceryHub</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@100..800&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <!-- DaisyUI + TailwindCSS -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.23/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <script src="https://kit.fontawesome.com/d18f75e53f.js" crossorigin="anonymous"></script>
    <!-- AOS Animation -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .font-sora { font-family: "Sora", serif; }
        .font-poppins { font-family: "Poppins", serif; }
        
        .filter-sidebar {
            transition: all 0.3s ease;
        }
        
        @media (max-width: 768px) {
            .filter-sidebar {
                position: fixed;
                top: 0;
                left: 0;
                width: 280px;
                height: 100vh;
                background: white;
                z-index: 100;
                overflow-y: auto;
                transform: translateX(-100%);
                transition: transform 0.3s ease;
            }
            
            .filter-sidebar.open {
                transform: translateX(0);
            }
            
            .filter-overlay {
                display: none;
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: rgba(0,0,0,0.5);
                z-index: 99;
            }
            
            .filter-overlay.open {
                display: block;
            }
        }
        
        .category-filter-item {
            cursor: pointer;
            transition: all 0.2s ease;
            padding: 8px 12px;
            border-radius: 8px;
        }
        
        .category-filter-item:hover {
            background: #f0fdf4;
        }
        
        .category-filter-item.active {
            background: #16a34a;
            color: white;
        }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'btn-primary': '#16a34a',
                        'primary-green': '#179800',
                        'accent-orange': '#FF8C42',
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-[#fffffe]">

    <!-- Header Placeholder -->
    <div id="header-placeholder"></div>

    <main>
        <!-- Shop Hero Section -->
        <section class="shop-hero w-full py-20 lg:py-28 text-white relative overflow-hidden">
            <div class="container mx-auto px-4 lg:px-20 text-center relative z-10" data-aos="fade-down">
                <div class="inline-block p-4 bg-white/20 rounded-full mb-4">
                    <i class="fas fa-store text-4xl"></i>
                </div>
                <h1 class="font-sora text-4xl lg:text-6xl font-bold mb-4">
                    Shop Fresh <span class="text-yellow-300">Groceries</span>
                </h1>
                <p class="font-poppins text-lg lg:text-xl max-w-2xl mx-auto">Discover the finest quality fruits, vegetables, spices, and more at unbeatable prices!</p>
                <div class="flex gap-3 justify-center mt-6">
                    <span class="px-3 py-1 bg-white/20 rounded-full text-sm"><i class="fas fa-leaf"></i> 100% Fresh</span>
                    <span class="px-3 py-1 bg-white/20 rounded-full text-sm"><i class="fas fa-truck"></i> Free Delivery</span>
                    <span class="px-3 py-1 bg-white/20 rounded-full text-sm"><i class="fas fa-tag"></i> Best Prices</span>
                </div>
            </div>
            <!-- Background Icons -->
            <div class="absolute inset-0 pointer-events-none">
                <i class="fas fa-apple-alt text-7xl absolute top-10 left-10 text-white/10"></i>
                <i class="fas fa-carrot text-6xl absolute bottom-10 right-20 text-white/10"></i>
                <i class="fas fa-pepper-hot text-5xl absolute top-1/2 left-1/4 text-white/10"></i>
                <i class="fas fa-cheese text-6xl absolute bottom-20 left-40 text-white/10"></i>
                <i class="fas fa-wheat-alt text-5xl absolute top-40 right-32 text-white/10"></i>
            </div>
        </section>

        <!-- Shop Layout -->
        <div class="container mx-auto px-4 lg:px-20 py-12">
            <!-- Mobile Filter Toggle -->
            <div class="lg:hidden mb-4">
                <button onclick="toggleMobileFilter()" class="btn bg-green-600 text-white w-full py-3 rounded-xl">
                    <i class="fas fa-filter"></i> Filter Products
                </button>
            </div>
            
            <!-- Filter Overlay (mobile) -->
            <div id="filter-overlay" class="filter-overlay" onclick="toggleMobileFilter()"></div>

            <div class="flex flex-col lg:flex-row gap-8">
                <!-- Filters Sidebar -->
                <aside id="filter-sidebar" class="filter-sidebar lg:w-80 bg-white rounded-xl shadow-sm p-6 h-fit lg:sticky lg:top-24">
                    <div class="flex justify-between items-center lg:hidden mb-4">
                        <h3 class="font-sora font-bold text-xl">Filters</h3>
                        <button onclick="toggleMobileFilter()" class="text-2xl">&times;</button>
                    </div>
                    
                    <h3 class="font-sora font-bold text-xl hidden lg:block mb-4"><i class="fas fa-filter text-green-600"></i> Filters</h3>
                    
                    <!-- Search -->
                    <div class="mb-6">
                        <label class="font-semibold block mb-2"><i class="fas fa-search"></i> Search Products</label>
                        <input type="text" id="search-input" placeholder="Search by name..." class="w-full p-3 border border-gray-200 rounded-lg focus:outline-none focus:border-green-500">
                    </div>
                    
                    <!-- Categories -->
                    <div class="mb-6">
                        <label class="font-semibold block mb-2"><i class="fas fa-tags"></i> Categories</label>
                        <div class="space-y-2">
                            <label class="category-filter-item flex items-center gap-2 cursor-pointer p-2 rounded-lg hover:bg-green-50">
                                <input type="radio" name="category" value="all" class="category-filter" checked> 
                                <span>📦 All Products</span>
                            </label>
                            <label class="category-filter-item flex items-center gap-2 cursor-pointer p-2 rounded-lg hover:bg-green-50">
                                <input type="radio" name="category" value="fruits" class="category-filter"> 
                                <span>🍎 Fruits</span>
                            </label>
                            <label class="category-filter-item flex items-center gap-2 cursor-pointer p-2 rounded-lg hover:bg-green-50">
                                <input type="radio" name="category" value="vegetables" class="category-filter"> 
                                <span>🥬 Vegetables</span>
                            </label>
                            <label class="category-filter-item flex items-center gap-2 cursor-pointer p-2 rounded-lg hover:bg-green-50">
                                <input type="radio" name="category" value="grains" class="category-filter"> 
                                <span>🌾 Grains & Rice</span>
                            </label>
                            <label class="category-filter-item flex items-center gap-2 cursor-pointer p-2 rounded-lg hover:bg-green-50">
                                <input type="radio" name="category" value="spices" class="category-filter"> 
                                <span>🌶️ Spices</span>
                            </label>
                            <label class="category-filter-item flex items-center gap-2 cursor-pointer p-2 rounded-lg hover:bg-green-50">
                                <input type="radio" name="category" value="oils" class="category-filter"> 
                                <span>🛢️ Oils</span>
                            </label>
                        </div>
                    </div>
                    
                    <!-- Price Range -->
                    <div class="mb-6">
                        <label class="font-semibold block mb-2"><i class="fas fa-rupee-sign"></i> Price Range</label>
                        <div class="flex gap-2">
                            <input type="number" id="min-price" placeholder="Min" value="0" class="w-1/2 p-2 border border-gray-200 rounded-lg">
                            <input type="number" id="max-price" placeholder="Max" value="1000" class="w-1/2 p-2 border border-gray-200 rounded-lg">
                        </div>
                    </div>
                    
                    <!-- Reset Button -->
                    <button id="reset-filters" class="w-full py-2 border border-gray-300 rounded-lg hover:bg-gray-100 transition">
                        <i class="fas fa-undo-alt"></i> Reset All Filters
                    </button>
                </aside>

                <!-- Products Grid -->
                <div class="flex-1">
                    <!-- Products Header -->
                    <div class="flex justify-between items-center mb-6 flex-wrap gap-4">
                        <p id="products-count" class="text-gray-500">Showing 0 products</p>
                        <select id="sort-select" class="p-2 border border-gray-200 rounded-lg bg-white">
                            <option value="default">Sort by: Default</option>
                            <option value="price-low">Price: Low to High</option>
                            <option value="price-high">Price: High to Low</option>
                            <option value="rating">Top Rated</option>
                            <option value="name">Name: A to Z</option>
                        </select>
                    </div>
                    
                    <!-- Products Grid Container -->
                    <div id="shop-products-grid" class="grid grid-cols-2 lg:grid-cols-3 gap-4 lg:gap-6">
                        <!-- Products loaded via JS -->
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer Placeholder -->
    <div id="footer-placeholder"></div>

    <!-- Cart Sidebar -->
    <div id="cart-sidebar" class="cart-sidebar">
        <div class="cart-sidebar-header">
            <h2 class="text-xl font-bold"><i class="fas fa-shopping-cart"></i> Your Cart</h2>
            <button onclick="toggleCartSidebar()" class="text-2xl">&times;</button>
        </div>
        <div id="cart-sidebar-items" class="cart-sidebar-items"></div>
        <div class="cart-sidebar-footer">
            <div class="flex justify-between font-bold text-lg mb-4">
                <span>Total:</span>
                <span id="cart-sidebar-total">₹0</span>
            </div>
            <a href="cart.html" class="btn btn-primary w-full bg-green-600 text-white py-2 rounded-lg text-center block">View Cart</a>
            <a href="checkout.html" class="btn btn-success w-full bg-orange-500 text-white py-2 rounded-lg text-center block mt-2">Checkout</a>
        </div>
    </div>

    <!-- Quick View Modal -->
    <div id="quick-view-modal" class="quick-view-modal">
        <div class="quick-view-content p-6">
            <div class="flex justify-end mb-2">
                <button onclick="closeQuickView()" class="text-2xl hover:text-red-500">&times;</button>
            </div>
            <div id="quick-view-content"></div>
        </div>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="assets/js/products.js"></script>
    <script src="assets/js/main.js"></script>
    
    <script>
        function toggleMobileFilter() {
            const sidebar = document.getElementById('filter-sidebar');
            const overlay = document.getElementById('filter-overlay');
            sidebar.classList.toggle('open');
            overlay.classList.toggle('open');
        }
        
        // Check authentication for shop access
        const currentUser = JSON.parse(localStorage.getItem('currentUser'));
        if (!currentUser && window.location.pathname.includes('shop.html')) {
            // Don't redirect immediately - let them view but prompt on add to cart?
            // Actually we already have protection on the shop link from header
        }
    </script>
</body>

</html>
