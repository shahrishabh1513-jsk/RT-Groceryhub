<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop - RT GroceryHub</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/components.css">
    <link rel="stylesheet" href="assets/css/responsive.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <main>
        <section class="page-header" style="background: var(--navy); color: white; padding: 3rem 0; text-align: center;">
            <div class="container">
                <h1>Our Shop</h1>
                <p>Fresh groceries delivered to your doorstep</p>
            </div>
        </section>

        <section class="shop-section" style="padding: 3rem 0;">
            <div class="container">
                <div class="shop-layout" style="display: grid; grid-template-columns: 280px 1fr; gap: 2rem;">
                    <!-- Sidebar Filters -->
                    <aside class="filters-sidebar" style="background: white; padding: 1.5rem; border-radius: var(--border-radius-lg); height: fit-content;">
                        <h3 style="margin-bottom: 1.5rem;">Filters</h3>
                        
                        <div class="filter-group" style="margin-bottom: 1.5rem;">
                            <label style="font-weight: 600; margin-bottom: 0.5rem; display: block;">Search</label>
                            <input type="text" id="search-products" placeholder="Search products..." style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px;">
                        </div>
                        
                        <div class="filter-group" style="margin-bottom: 1.5rem;">
                            <label style="font-weight: 600; margin-bottom: 0.5rem; display: block;">Category</label>
                            <select id="category-filter" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px;">
                                <option value="all">All Categories</option>
                                <option value="fruits">Fruits</option>
                                <option value="vegetables">Vegetables</option>
                                <option value="dairy">Dairy</option>
                                <option value="snacks">Snacks</option>
                            </select>
                        </div>
                        
                        <div class="filter-group" style="margin-bottom: 1.5rem;">
                            <label style="font-weight: 600; margin-bottom: 0.5rem; display: block;">Price Range</label>
                            <select id="price-filter" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px;">
                                <option value="all">All Prices</option>
                                <option value="0-50">Under ₹50</option>
                                <option value="50-100">₹50 - ₹100</option>
                                <option value="100-200">₹100 - ₹200</option>
                                <option value="200-500">₹200+</option>
                            </select>
                        </div>
                        
                        <div class="filter-group" style="margin-bottom: 1.5rem;">
                            <label style="font-weight: 600; margin-bottom: 0.5rem; display: block;">Sort By</label>
                            <select id="sort-products" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px;">
                                <option value="default">Default</option>
                                <option value="price-low">Price: Low to High</option>
                                <option value="price-high">Price: High to Low</option>
                                <option value="rating">Top Rated</option>
                            </select>
                        </div>
                    </aside>
                    
                    <!-- Products Grid -->
                    <div>
                        <div id="shop-products-grid" class="products-grid"></div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div id="footer-placeholder"></div>

    <script src="assets/js/main.js"></script>
    <script src="assets/js/products.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            setupFilters();
        });
    </script>
</body>
</html>
