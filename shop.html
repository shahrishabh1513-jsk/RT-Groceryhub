<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop - RT GroceryHub</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@100..800&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <!-- DaisyUI + TailwindCSS -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.23/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <script src="https://kit.fontawesome.com/d18f75e53f.js" crossorigin="anonymous"></script>
    <!-- AOS Animation -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .font-sora { font-family: "Sora", serif; }
        .font-poppins { font-family: "Poppins", serif; }
        
        .filter-sidebar {
            transition: all 0.3s ease;
        }
        
        .filter-sidebar.collapsed {
            transform: translateX(-100%);
            position: fixed;
            z-index: 50;
        }
        
        @media (max-width: 768px) {
            .filter-sidebar {
                position: fixed;
                top: 0;
                left: 0;
                width: 280px;
                height: 100vh;
                background: white;
                z-index: 100;
                overflow-y: auto;
                transform: translateX(-100%);
                transition: transform 0.3s ease;
            }
            
            .filter-sidebar.open {
                transform: translateX(0);
            }
            
            .filter-overlay {
                display: none;
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: rgba(0,0,0,0.5);
                z-index: 99;
            }
            
            .filter-overlay.open {
                display: block;
            }
        }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'btn-primary': '#16a34a',
                        'primary-green': '#179800',
                        'accent-orange': '#FF8C42',
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-[#fffffe]">

    <!-- Header Placeholder -->
    <div id="header-placeholder"></div>

    <main>
        <!-- Shop Header -->
        <section class="w-full bg-gradient-to-r from-green-700 to-green-500 py-16 text-white">
            <div class="container mx-auto px-4 lg:px-20 text-center" data-aos="fade-down">
                <h1 class="font-sora text-3xl lg:text-5xl font-bold mb-4">
                    <i class="fas fa-store"></i> Shop Fresh Groceries
                </h1>
                <p class="font-poppins text-lg lg:text-xl">Discover the finest quality fruits, vegetables, and more at unbeatable prices!</p>
            </div>
        </section>

        <!-- Shop Layout -->
        <div class="container mx-auto px-4 lg:px-20 py-12">
            <!-- Mobile Filter Toggle -->
            <div class="lg:hidden mb-4">
                <button onclick="toggleMobileFilter()" class="btn bg-green-600 text-white w-full">
                    <i class="fas fa-filter"></i> Filter Products
                </button>
            </div>
            
            <!-- Filter Overlay (mobile) -->
            <div id="filter-overlay" class="filter-overlay" onclick="toggleMobileFilter()"></div>

            <div class="flex flex-col lg:flex-row gap-8">
                <!-- Filters Sidebar -->
                <aside id="filter-sidebar" class="filter-sidebar lg:w-80 bg-white rounded-xl shadow-sm p-6 h-fit lg:sticky lg:top-24">
                    <div class="flex justify-between items-center lg:hidden mb-4">
                        <h3 class="font-sora font-bold text-xl">Filters</h3>
                        <button onclick="toggleMobileFilter()" class="text-2xl">&times;</button>
                    </div>
                    
                    <h3 class="font-sora font-bold text-xl hidden lg:block mb-4"><i class="fas fa-filter text-green-600"></i> Filters</h3>
                    
                    <!-- Search -->
                    <div class="mb-6">
                        <label class="font-semibold block mb-2"><i class="fas fa-search"></i> Search Products</label>
                        <input type="text" id="search-input" placeholder="Search by name..." class="w-full p-3 border border-gray-200 rounded-lg focus:outline-none focus:border-green-500">
                    </div>
                    
                    <!-- Categories -->
                    <div class="mb-6">
                        <label class="font-semibold block mb-2"><i class="fas fa-tags"></i> Categories</label>
                        <ul id="category-filters" class="space-y-2">
                            <li><label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" value="all" checked class="rounded"> All Products</label></li>
                            <li><label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" value="fruits" class="rounded"> 🍎 Fruits</label></li>
                            <li><label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" value="vegetables" class="rounded"> 🥬 Vegetables</label></li>
                            <li><label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" value="grains" class="rounded"> 🌾 Grains & Rice</label></li>
                            <li><label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" value="spices" class="rounded"> 🌶️ Spices</label></li>
                            <li><label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" value="dairy" class="rounded"> 🥛 Dairy</label></li>
                        </ul>
                    </div>
                    
                    <!-- Price Range -->
                    <div class="mb-6">
                        <label class="font-semibold block mb-2"><i class="fas fa-rupee-sign"></i> Price Range</label>
                        <div class="flex gap-2">
                            <input type="number" id="min-price" placeholder="Min" value="0" class="w-1/2 p-2 border border-gray-200 rounded-lg">
                            <input type="number" id="max-price" placeholder="Max" value="500" class="w-1/2 p-2 border border-gray-200 rounded-lg">
                        </div>
                    </div>
                    
                    <!-- Reset Button -->
                    <button id="reset-filters" class="w-full py-2 border border-gray-300 rounded-lg hover:bg-gray-100 transition">
                        <i class="fas fa-undo-alt"></i> Reset All Filters
                    </button>
                </aside>

                <!-- Products Grid -->
                <div class="flex-1">
                    <!-- Products Header -->
                    <div class="flex justify-between items-center mb-6 flex-wrap gap-4">
                        <p id="products-count" class="text-gray-500">Showing 0 products</p>
                        <select id="sort-select" class="p-2 border border-gray-200 rounded-lg bg-white">
                            <option value="default">Sort by: Default</option>
                            <option value="price-low">Price: Low to High</option>
                            <option value="price-high">Price: High to Low</option>
                            <option value="rating">Top Rated</option>
                            <option value="name">Name: A to Z</option>
                        </select>
                    </div>
                    
                    <!-- Products Grid Container -->
                    <div id="shop-products-grid" class="grid grid-cols-2 lg:grid-cols-3 gap-4 lg:gap-6">
                        <!-- Products loaded via JS -->
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer Placeholder -->
    <div id="footer-placeholder"></div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="assets/js/main.js"></script>
    
    <script>
        // Mobile filter toggle function
        function toggleMobileFilter() {
            const sidebar = document.getElementById('filter-sidebar');
            const overlay = document.getElementById('filter-overlay');
            sidebar.classList.toggle('open');
            overlay.classList.toggle('open');
        }
    </script>
</body>

</html>
