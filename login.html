<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - RT GroceryHub</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        .auth-header {
            background: linear-gradient(135deg, var(--primary-green-dark), var(--primary-green));
            padding: 2rem 0;
            text-align: center;
            color: white;
        }
        .auth-container {
            min-height: 70vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 3rem 0;
        }
        .auth-card {
            background: var(--bg-card);
            border-radius: var(--border-radius-lg);
            padding: 2.5rem;
            width: 100%;
            max-width: 450px;
            box-shadow: var(--shadow-lg);
            transition: var(--transition);
        }
        .auth-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-hover);
        }
        .auth-tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            border-bottom: 2px solid rgba(0,0,0,0.05);
        }
        .auth-tab {
            padding: 0.8rem 0;
            cursor: pointer;
            font-weight: 600;
            color: var(--text-muted);
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            transition: var(--transition);
        }
        .auth-tab.active {
            color: var(--accent-orange);
            border-bottom-color: var(--accent-orange);
        }
        .auth-form {
            display: none;
            animation: fadeIn 0.4s ease;
        }
        .auth-form.active {
            display: block;
        }
        .form-group {
            margin-bottom: 1.2rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #e0e0e0;
            border-radius: var(--border-radius);
            transition: var(--transition);
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--accent-orange);
            box-shadow: 0 0 0 3px rgba(255,140,66,0.1);
        }
        .forgot-password {
            text-align: right;
            margin-top: 0.5rem;
        }
        .forgot-password a {
            color: var(--accent-orange);
            text-decoration: none;
            font-size: 0.85rem;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div id="header-placeholder"></div>

    <main>
        <section class="auth-header" data-aos="fade-down">
            <div class="container">
                <h1><i class="fas fa-user-circle"></i> Welcome Back</h1>
                <p>Login to your account or create a new one</p>
            </div>
        </section>

        <div class="container">
            <div class="auth-container" data-aos="zoom-in">
                <div class="auth-card">
                    <div class="auth-tabs">
                        <div class="auth-tab active" data-tab="login">Login</div>
                        <div class="auth-tab" data-tab="register">Create Account</div>
                    </div>
                    
                    <!-- Login Form -->
                    <form id="login-form" class="auth-form active">
                        <div class="form-group">
                            <label><i class="fas fa-envelope"></i> Email or Phone</label>
                            <input type="text" id="login-email" placeholder="Enter email or phone" required>
                        </div>
                        <div class="form-group">
                            <label><i class="fas fa-lock"></i> Password</label>
                            <input type="password" id="login-password" placeholder="Enter password" required>
                        </div>
                        <div class="forgot-password">
                            <a href="#">Forgot Password?</a>
                        </div>
                        <button type="submit" class="btn btn-primary ripple" style="width: 100%; justify-content: center; margin-top: 1rem;">
                            <i class="fas fa-sign-in-alt"></i> Login
                        </button>
                        <p style="text-align: center; margin-top: 1.5rem; color: var(--text-muted);">
                            Don't have an account? <a href="#" onclick="switchTab('register')" style="color: var(--accent-orange);">Register</a>
                        </p>
                    </form>
                    
                    <!-- Register Form -->
                    <form id="register-form" class="auth-form">
                        <div class="form-group">
                            <label><i class="fas fa-user"></i> Full Name</label>
                            <input type="text" id="reg-name" placeholder="Enter your full name" required>
                        </div>
                        <div class="form-group">
                            <label><i class="fas fa-envelope"></i> Email Address</label>
                            <input type="email" id="reg-email" placeholder="your@email.com" required>
                        </div>
                        <div class="form-group">
                            <label><i class="fas fa-phone"></i> Phone Number</label>
                            <input type="tel" id="reg-phone" placeholder="10-digit mobile number" required>
                        </div>
                        <div class="form-group">
                            <label><i class="fas fa-lock"></i> Password</label>
                            <input type="password" id="reg-password" placeholder="Create password" required>
                        </div>
                        <div class="form-group">
                            <label><i class="fas fa-check-circle"></i> Confirm Password</label>
                            <input type="password" id="reg-confirm" placeholder="Confirm password" required>
                        </div>
                        <button type="submit" class="btn btn-primary ripple" style="width: 100%; justify-content: center;">
                            <i class="fas fa-user-plus"></i> Create Account
                        </button>
                        <p style="text-align: center; margin-top: 1.5rem; color: var(--text-muted);">
                            Already have an account? <a href="#" onclick="switchTab('login')" style="color: var(--accent-orange);">Login</a>
                        </p>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
