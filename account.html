<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Account - RT GroceryHub</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@100..800&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <!-- DaisyUI + TailwindCSS -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.23/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <script src="https://kit.fontawesome.com/d18f75e53f.js" crossorigin="anonymous"></script>
    <!-- AOS Animation -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .font-sora { font-family: "Sora", serif; }
        .font-poppins { font-family: "Poppins", serif; }
        
        .sidebar-item {
            transition: all 0.3s ease;
            position: relative;
        }
        
        .sidebar-item.active {
            background-color: #f0fdf4;
            color: #16a34a;
        }
        
        .sidebar-item.active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background-color: #16a34a;
            border-radius: 3px;
        }
        
        .sidebar-item:hover:not(.active) {
            background-color: #f9fafb;
            color: #16a34a;
        }
        
        .profile-avatar {
            transition: all 0.3s ease;
        }
        
        .profile-avatar:hover {
            transform: scale(1.05);
        }
        
        .order-card {
            transition: all 0.3s ease;
        }
        
        .order-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }
        
        .address-card {
            transition: all 0.3s ease;
        }
        
        .address-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
        }
        
        .stat-card {
            transition: all 0.3s ease;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            animation: modalSlideIn 0.3s ease;
        }
        
        @keyframes modalSlideIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-10px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        
        .order-item {
            animation: slideIn 0.3s ease forwards;
        }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'btn-primary': '#16a34a',
                        'primary-green': '#179800',
                        'accent-orange': '#FF8C42',
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-[#fffffe]">

    <!-- Header Placeholder -->
    <div id="header-placeholder"></div>

    <main>
        <!-- Account Header -->
        <section class="w-full bg-gradient-to-r from-green-700 to-green-500 py-12 lg:py-16 text-white">
            <div class="container mx-auto px-4 lg:px-20 text-center" data-aos="fade-down">
                <h1 class="font-sora text-3xl lg:text-5xl font-bold mb-3">
                    <i class="fas fa-user-circle"></i> My Account
                </h1>
                <p class="font-poppins text-base lg:text-lg">Manage your profile, orders, and preferences</p>
            </div>
        </section>

        <!-- Account Content -->
        <div class="container mx-auto px-4 lg:px-20 py-12">
            <div class="flex flex-col lg:flex-row gap-8">
                <!-- Sidebar -->
                <aside class="lg:w-80" data-aos="fade-right">
                    <div class="bg-white rounded-2xl shadow-sm overflow-hidden sticky top-24">
                        <div class="p-6 text-center border-b border-gray-100">
                            <div class="profile-avatar relative inline-block">
                                <div class="w-24 h-24 bg-gradient-to-br from-green-400 to-green-600 rounded-full flex items-center justify-center mx-auto">
                                    <i class="fas fa-user text-4xl text-white"></i>
                                </div>
                            </div>
                            <h3 id="user-name" class="font-sora font-bold text-xl mt-3">Guest User</h3>
                            <p id="user-email" class="text-gray-500 text-sm">guest@example.com</p>
                            <p class="text-xs text-green-600 mt-1" id="member-since">Member since 2024</p>
                        </div>
                        
                        <div class="p-4">
                            <button onclick="switchSection('profile')" class="sidebar-item active w-full text-left px-4 py-3 rounded-xl flex items-center gap-3 transition" data-section="profile">
                                <i class="fas fa-user-circle w-5"></i>
                                <span>Profile Information</span>
                            </button>
                            <button onclick="switchSection('orders')" class="sidebar-item w-full text-left px-4 py-3 rounded-xl flex items-center gap-3 transition" data-section="orders">
                                <i class="fas fa-history w-5"></i>
                                <span>Order History</span>
                                <span id="order-count-badge" class="ml-auto bg-gray-100 text-gray-600 text-xs px-2 py-1 rounded-full">0</span>
                            </button>
                            <button onclick="switchSection('addresses')" class="sidebar-item w-full text-left px-4 py-3 rounded-xl flex items-center gap-3 transition" data-section="addresses">
                                <i class="fas fa-map-marker-alt w-5"></i>
                                <span>Saved Addresses</span>
                                <span id="address-count-badge" class="ml-auto bg-gray-100 text-gray-600 text-xs px-2 py-1 rounded-full">0</span>
                            </button>
                            <div class="border-t border-gray-100 my-3"></div>
                            <button id="logout-btn" class="sidebar-item w-full text-left px-4 py-3 rounded-xl flex items-center gap-3 transition text-red-500 hover:bg-red-50">
                                <i class="fas fa-sign-out-alt w-5"></i>
                                <span>Logout</span>
                            </button>
                        </div>
                    </div>
                </aside>

                <!-- Main Content -->
                <div class="flex-1" data-aos="fade-left">
                    <!-- Profile Section -->
                    <div id="profile-section" class="account-section active">
                        <div class="bg-white rounded-2xl shadow-sm p-6 lg:p-8">
                            <div class="flex justify-between items-center mb-6">
                                <h2 class="font-sora text-2xl font-bold text-gray-800">
                                    <i class="fas fa-id-card text-green-600"></i> Profile Information
                                </h2>
                                <button onclick="openProfileEditModal()" class="text-green-600 hover:text-green-700 font-semibold flex items-center gap-2">
                                    <i class="fas fa-edit"></i> Edit Profile
                                </button>
                            </div>
                            <div id="profile-info" class="space-y-4">
                                <!-- Profile info loaded dynamically -->
                            </div>
                            
                            <!-- Stats Cards -->
                            <div class="grid grid-cols-2 lg:grid-cols-3 gap-4 mt-8 pt-6 border-t">
                                <div class="stat-card bg-gray-50 rounded-xl p-4 text-center">
                                    <i class="fas fa-shopping-bag text-2xl text-green-600"></i>
                                    <p class="text-2xl font-bold mt-1" id="total-orders">0</p>
                                    <p class="text-sm text-gray-500">Total Orders</p>
                                </div>
                                <div class="stat-card bg-gray-50 rounded-xl p-4 text-center">
                                    <i class="fas fa-rupee-sign text-2xl text-green-600"></i>
                                    <p class="text-2xl font-bold mt-1" id="total-spent">₹0</p>
                                    <p class="text-sm text-gray-500">Total Spent</p>
                                </div>
                                <div class="stat-card bg-gray-50 rounded-xl p-4 text-center">
                                    <i class="fas fa-calendar-alt text-2xl text-green-600"></i>
                                    <p class="text-2xl font-bold mt-1" id="member-days">0</p>
                                    <p class="text-sm text-gray-500">Member Days</p>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Orders Section -->
                    <div id="orders-section" class="account-section hidden">
                        <div class="bg-white rounded-2xl shadow-sm p-6 lg:p-8">
                            <div class="flex justify-between items-center mb-6 flex-wrap gap-4">
                                <h2 class="font-sora text-2xl font-bold text-gray-800">
                                    <i class="fas fa-history text-green-600"></i> Order History
                                </h2>
                                <select id="order-filter" class="p-2 border border-gray-200 rounded-lg bg-white">
                                    <option value="all">All Orders</option>
                                    <option value="delivered">Delivered</option>
                                    <option value="pending">Pending</option>
                                    <option value="cancelled">Cancelled</option>
                                </select>
                            </div>
                            <div id="orders-list" class="space-y-4">
                                <!-- Orders loaded dynamically -->
                            </div>
                        </div>
                    </div>

                    <!-- Addresses Section -->
                    <div id="addresses-section" class="account-section hidden">
                        <div class="bg-white rounded-2xl shadow-sm p-6 lg:p-8">
                            <div class="flex justify-between items-center mb-6">
                                <h2 class="font-sora text-2xl font-bold text-gray-800">
                                    <i class="fas fa-location-dot text-green-600"></i> Saved Addresses
                                </h2>
                                <button onclick="openAddressModal()" class="bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700 transition flex items-center gap-2">
                                    <i class="fas fa-plus"></i> Add New Address
                                </button>
                            </div>
                            <div id="addresses-list" class="grid grid-cols-1 lg:grid-cols-2 gap-4">
                                <!-- Addresses loaded dynamically -->
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer Placeholder -->
    <div id="footer-placeholder"></div>

    <!-- Cart Sidebar -->
    <div id="cart-sidebar" class="cart-sidebar">
        <div class="cart-sidebar-header">
            <h2 class="text-xl font-bold"><i class="fas fa-shopping-cart"></i> Your Cart</h2>
            <button onclick="toggleCartSidebar()" class="text-2xl">&times;</button>
        </div>
        <div id="cart-sidebar-items" class="cart-sidebar-items"></div>
        <div class="cart-sidebar-footer">
            <div class="flex justify-between font-bold text-lg mb-4">
                <span>Total:</span>
                <span id="cart-sidebar-total">₹0</span>
            </div>
            <a href="cart.html" class="btn btn-primary w-full bg-green-600 text-white py-2 rounded-lg text-center block">View Cart</a>
            <a href="checkout.html" class="btn btn-success w-full bg-orange-500 text-white py-2 rounded-lg text-center block mt-2">Checkout</a>
        </div>
    </div>

    <!-- Edit Profile Modal -->
    <div id="edit-profile-modal" class="modal">
        <div class="modal-content bg-white rounded-2xl max-w-md w-full mx-4 p-6">
            <div class="flex justify-between items-center mb-4">
                <h3 class="font-sora text-xl font-bold">Edit Profile</h3>
                <button onclick="closeModal('edit-profile-modal')" class="text-2xl">&times;</button>
            </div>
            <form id="edit-profile-form">
                <div class="mb-4">
                    <label class="block text-sm font-medium mb-1">Full Name</label>
                    <input type="text" id="edit-name" class="w-full p-3 border border-gray-200 rounded-lg focus:border-green-500 focus:outline-none">
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-medium mb-1">Email Address</label>
                    <input type="email" id="edit-email" class="w-full p-3 border border-gray-200 rounded-lg focus:border-green-500 focus:outline-none">
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-medium mb-1">Phone Number</label>
                    <input type="tel" id="edit-phone" class="w-full p-3 border border-gray-200 rounded-lg focus:border-green-500 focus:outline-none">
                </div>
                <div class="flex gap-3">
                    <button type="submit" class="flex-1 bg-green-600 text-white py-2 rounded-lg hover:bg-green-700 transition">Save Changes</button>
                    <button type="button" onclick="closeModal('edit-profile-modal')" class="flex-1 border border-gray-300 py-2 rounded-lg hover:bg-gray-50 transition">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Add Address Modal -->
    <div id="address-modal" class="modal">
        <div class="modal-content bg-white rounded-2xl max-w-md w-full mx-4 p-6">
            <div class="flex justify-between items-center mb-4">
                <h3 class="font-sora text-xl font-bold">Add New Address</h3>
                <button onclick="closeModal('address-modal')" class="text-2xl">&times;</button>
            </div>
            <form id="add-address-form">
                <div class="mb-4">
                    <label class="block text-sm font-medium mb-1">Full Name</label>
                    <input type="text" id="addr-name" class="w-full p-3 border border-gray-200 rounded-lg focus:border-green-500 focus:outline-none">
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-medium mb-1">Phone Number</label>
                    <input type="tel" id="addr-phone" class="w-full p-3 border border-gray-200 rounded-lg focus:border-green-500 focus:outline-none">
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-medium mb-1">Street Address</label>
                    <textarea id="addr-address" rows="2" class="w-full p-3 border border-gray-200 rounded-lg focus:border-green-500 focus:outline-none"></textarea>
                </div>
                <div class="grid grid-cols-2 gap-3 mb-4">
                    <div>
                        <label class="block text-sm font-medium mb-1">City</label>
                        <input type="text" id="addr-city" class="w-full p-3 border border-gray-200 rounded-lg focus:border-green-500 focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">PIN Code</label>
                        <input type="text" id="addr-pincode" class="w-full p-3 border border-gray-200 rounded-lg focus:border-green-500 focus:outline-none">
                    </div>
                </div>
                <div class="flex gap-3">
                    <button type="submit" class="flex-1 bg-green-600 text-white py-2 rounded-lg hover:bg-green-700 transition">Save Address</button>
                    <button type="button" onclick="closeModal('address-modal')" class="flex-1 border border-gray-300 py-2 rounded-lg hover:bg-gray-50 transition">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="assets/js/main.js"></script>
    
    <script>
        let currentUser = null;
        
        // Initialize account page
        function initAccountPage() {
            currentUser = JSON.parse(localStorage.getItem('currentUser'));
            if (!currentUser) {
                window.location.href = 'login.html';
                return;
            }
            
            document.getElementById('user-name').textContent = currentUser.name;
            document.getElementById('user-email').textContent = currentUser.email;
            
            const joinDate = new Date(currentUser.joinDate);
            document.getElementById('member-since').textContent = `Member since ${joinDate.toLocaleDateString('en-IN', { year: 'numeric', month: 'short' })}`;
            
            // Load all data
            loadProfileInfo();
            loadOrders();
            loadAddresses();
            updateStats();
        }
        
        // Load profile info
        function loadProfileInfo() {
            const container = document.getElementById('profile-info');
            container.innerHTML = `
                <div class="flex justify-between items-center py-3 border-b">
                    <span class="font-semibold text-gray-600">Full Name:</span>
                    <span class="text-gray-800">${currentUser.name || 'Not set'}</span>
                </div>
                <div class="flex justify-between items-center py-3 border-b">
                    <span class="font-semibold text-gray-600">Email Address:</span>
                    <span class="text-gray-800">${currentUser.email || 'Not set'}</span>
                </div>
                <div class="flex justify-between items-center py-3 border-b">
                    <span class="font-semibold text-gray-600">Phone Number:</span>
                    <span class="text-gray-800">${currentUser.phone || 'Not added'}</span>
                </div>
                <div class="flex justify-between items-center py-3">
                    <span class="font-semibold text-gray-600">Member Since:</span>
                    <span class="text-gray-800">${new Date(currentUser.joinDate).toLocaleDateString('en-IN', { day: 'numeric', month: 'long', year: 'numeric' })}</span>
                </div>
            `;
        }
        
        // Load orders - FIXED to show orders properly
        function loadOrders() {
            const orders = JSON.parse(localStorage.getItem('orders')) || [];
            const userOrders = orders.filter(order => order.customer && order.customer.email === currentUser.email);
            
            console.log('User orders:', userOrders);
            
            document.getElementById('order-count-badge').textContent = userOrders.length;
            
            const filter = document.getElementById('order-filter')?.value || 'all';
            let filteredOrders = userOrders;
            if (filter !== 'all') {
                filteredOrders = userOrders.filter(order => order.status === filter);
            }
            
            const container = document.getElementById('orders-list');
            if (filteredOrders.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-12">
                        <i class="fas fa-shopping-bag text-5xl text-gray-300 mb-3"></i>
                        <p class="text-gray-500">No orders found</p>
                        <a href="shop.html" class="inline-block mt-3 text-green-600 font-semibold">Start Shopping →</a>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = filteredOrders.map((order, index) => `
                <div class="order-card border rounded-xl p-4 order-item" style="animation-delay: ${index * 0.05}s">
                    <div class="flex justify-between items-start flex-wrap gap-2 mb-3">
                        <div>
                            <span class="font-mono text-green-600 font-bold">${order.orderId}</span>
                            <p class="text-xs text-gray-400">${new Date(order.orderDate).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' })}</p>
                        </div>
                        <span class="px-3 py-1 rounded-full text-xs font-semibold ${order.status === 'delivered' ? 'bg-green-100 text-green-600' : order.status === 'cancelled' ? 'bg-red-100 text-red-600' : 'bg-yellow-100 text-yellow-600'}">
                            ${order.status || 'Delivered'}
                        </span>
                    </div>
                    <div class="space-y-2">
                        ${order.items && order.items.slice(0, 2).map(item => `
                            <div class="flex justify-between text-sm">
                                <span>${item.name} x ${item.quantity}</span>
                                <span>₹${(item.price || 0) * (item.quantity || 0)}</span>
                            </div>
                        `).join('')}
                        ${order.items && order.items.length > 2 ? `<div class="text-xs text-gray-400">+${order.items.length - 2} more items</div>` : ''}
                    </div>
                    <div class="flex justify-between items-center mt-3 pt-3 border-t">
                        <span class="font-bold">Total: ₹${order.total || 0}</span>
                        <button onclick="viewOrderDetails('${order.orderId}')" class="text-green-600 text-sm hover:underline">View Details</button>
                    </div>
                </div>
            `).join('');
        }
        
        // View order details - FIXED
        function viewOrderDetails(orderId) {
            const orders = JSON.parse(localStorage.getItem('orders')) || [];
            const order = orders.find(o => o.orderId === orderId);
            if (order) {
                let itemsHtml = order.items.map(item => `
                    <div class="flex justify-between py-2 border-b">
                        <span>${item.name} x ${item.quantity}</span>
                        <span>₹${(item.price || 0) * (item.quantity || 0)}</span>
                    </div>
                `).join('');
                
                alert(`Order ID: ${order.orderId}\nDate: ${new Date(order.orderDate).toLocaleString()}\n\nItems:\n${order.items.map(i => `${i.name} x ${i.quantity} = ₹${i.price * i.quantity}`).join('\n')}\n\nTotal: ₹${order.total}\nPayment: ${order.paymentMethod}\nStatus: ${order.status || 'Delivered'}`);
            } else {
                alert('Order details not found');
            }
        }
        
        // Load addresses
        function loadAddresses() {
            let addresses = JSON.parse(localStorage.getItem('user_addresses')) || [];
            addresses = addresses.filter(addr => addr.userEmail === currentUser.email);
            
            document.getElementById('address-count-badge').textContent = addresses.length;
            
            const container = document.getElementById('addresses-list');
            if (addresses.length === 0) {
                container.innerHTML = `
                    <div class="col-span-full text-center py-12">
                        <i class="fas fa-map-marker-alt text-5xl text-gray-300 mb-3"></i>
                        <p class="text-gray-500">No saved addresses</p>
                        <button onclick="openAddressModal()" class="inline-block mt-3 text-green-600 font-semibold">Add New Address →</button>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = addresses.map((addr, index) => `
                <div class="address-card border rounded-xl p-4">
                    <div class="flex justify-between items-start">
                        <div>
                            <p class="font-semibold">${addr.name}</p>
                            <p class="text-sm text-gray-500">${addr.phone}</p>
                        </div>
                        <button onclick="deleteAddress(${index})" class="text-red-400 hover:text-red-600 transition">
                            <i class="fas fa-trash-alt"></i>
                        </button>
                    </div>
                    <p class="text-gray-600 text-sm mt-2">${addr.address}</p>
                    <p class="text-gray-500 text-xs mt-1">${addr.city} - ${addr.pincode}</p>
                    ${addr.isDefault ? '<span class="inline-block mt-2 text-xs bg-green-100 text-green-600 px-2 py-1 rounded">Default</span>' : '<button onclick="setDefaultAddress(' + index + ')" class="mt-2 text-xs text-green-600 hover:underline">Set as Default</button>'}
                </div>
            `).join('');
        }
        
        // Update stats - FIXED
        function updateStats() {
            const orders = JSON.parse(localStorage.getItem('orders')) || [];
            const userOrders = orders.filter(order => order.customer && order.customer.email === currentUser.email);
            
            const totalOrders = userOrders.length;
            const totalSpent = userOrders.reduce((sum, order) => sum + (order.total || 0), 0);
            const memberDays = Math.floor((new Date() - new Date(currentUser.joinDate)) / (1000 * 60 * 60 * 24));
            
            document.getElementById('total-orders').textContent = totalOrders;
            document.getElementById('total-spent').textContent = `₹${totalSpent}`;
            document.getElementById('member-days').textContent = memberDays;
        }
        
        // Switch section
        function switchSection(section) {
            document.querySelectorAll('.account-section').forEach(s => s.classList.add('hidden'));
            document.getElementById(`${section}-section`).classList.remove('hidden');
            
            document.querySelectorAll('.sidebar-item').forEach(item => {
                if (item.getAttribute('onclick') && item.getAttribute('onclick').includes(section)) {
                    item.classList.add('active');
                } else if (item.getAttribute('data-section') === section) {
                    item.classList.add('active');
                } else {
                    item.classList.remove('active');
                }
            });
        }
        
        // Modal functions
        function openProfileEditModal() {
            document.getElementById('edit-name').value = currentUser.name || '';
            document.getElementById('edit-email').value = currentUser.email || '';
            document.getElementById('edit-phone').value = currentUser.phone || '';
            document.getElementById('edit-profile-modal').classList.add('active');
        }
        
        function openAddressModal() {
            document.getElementById('address-modal').classList.add('active');
        }
        
        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
        }
        
        // Edit profile submission
        document.getElementById('edit-profile-form')?.addEventListener('submit', (e) => {
            e.preventDefault();
            currentUser.name = document.getElementById('edit-name').value;
            currentUser.email = document.getElementById('edit-email').value;
            currentUser.phone = document.getElementById('edit-phone').value;
            
            const users = JSON.parse(localStorage.getItem('users')) || [];
            const userIndex = users.findIndex(u => u.email === currentUser.email);
            if (userIndex !== -1) {
                users[userIndex] = currentUser;
                localStorage.setItem('users', JSON.stringify(users));
            }
            localStorage.setItem('currentUser', JSON.stringify(currentUser));
            
            loadProfileInfo();
            closeModal('edit-profile-modal');
            showNotification('Profile updated successfully!');
        });
        
        // Add address submission
        document.getElementById('add-address-form')?.addEventListener('submit', (e) => {
            e.preventDefault();
            const newAddress = {
                userEmail: currentUser.email,
                name: document.getElementById('addr-name').value,
                phone: document.getElementById('addr-phone').value,
                address: document.getElementById('addr-address').value,
                city: document.getElementById('addr-city').value,
                pincode: document.getElementById('addr-pincode').value,
                isDefault: false
            };
            
            let addresses = JSON.parse(localStorage.getItem('user_addresses')) || [];
            addresses.push(newAddress);
            localStorage.setItem('user_addresses', JSON.stringify(addresses));
            
            loadAddresses();
            closeModal('address-modal');
            document.getElementById('add-address-form').reset();
            showNotification('Address added successfully!');
        });
        
        // Delete address
        function deleteAddress(index) {
            let addresses = JSON.parse(localStorage.getItem('user_addresses')) || [];
            addresses = addresses.filter(addr => addr.userEmail === currentUser.email);
            addresses.splice(index, 1);
            
            const allAddresses = JSON.parse(localStorage.getItem('user_addresses')) || [];
            const filteredAddresses = allAddresses.filter(addr => addr.userEmail !== currentUser.email);
            localStorage.setItem('user_addresses', JSON.stringify([...filteredAddresses, ...addresses]));
            loadAddresses();
            showNotification('Address deleted');
        }
        
        // Set default address
        function setDefaultAddress(index) {
            let addresses = JSON.parse(localStorage.getItem('user_addresses')) || [];
            addresses = addresses.filter(addr => addr.userEmail === currentUser.email);
            addresses.forEach((addr, i) => addr.isDefault = (i === index));
            
            const allAddresses = JSON.parse(localStorage.getItem('user_addresses')) || [];
            const otherAddresses = allAddresses.filter(addr => addr.userEmail !== currentUser.email);
            localStorage.setItem('user_addresses', JSON.stringify([...otherAddresses, ...addresses]));
            loadAddresses();
            showNotification('Default address updated');
        }
        
        function showNotification(message, isError = false) {
            const notification = document.createElement('div');
            notification.className = `fixed bottom-4 right-4 px-6 py-3 rounded-lg shadow-lg z-50 transition-all ${isError ? 'bg-red-500' : 'bg-green-500'} text-white`;
            notification.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-triangle' : 'fa-check-circle'} mr-2"></i> ${message}`;
            document.body.appendChild(notification);
            setTimeout(() => notification.remove(), 3000);
        }
        
        // Order filter
        document.getElementById('order-filter')?.addEventListener('change', () => loadOrders());
        
        // Logout
        document.getElementById('logout-btn').addEventListener('click', () => {
            localStorage.removeItem('currentUser');
            window.location.href = 'login.html';
        });
        
        // Initialize on load
        document.addEventListener('DOMContentLoaded', () => {
            initAccountPage();
            if (typeof AOS !== 'undefined') {
                AOS.init({ duration: 800, once: true });
            }
        });
    </script>
</body>

</html>
