<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Account - RT GroceryHub</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        .account-header {
            background: linear-gradient(135deg, var(--primary-green-dark), var(--primary-green));
            padding: 2.5rem 0;
            text-align: center;
            color: white;
        }
        .account-wrapper {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 2rem;
            padding: 3rem 0;
        }
        .account-sidebar {
            background: var(--bg-card);
            border-radius: var(--border-radius-lg);
            padding: 1.8rem;
            height: fit-content;
            position: sticky;
            top: 100px;
            box-shadow: var(--shadow-sm);
        }
        .profile-avatar {
            text-align: center;
            margin-bottom: 1.5rem;
        }
        .profile-avatar .avatar {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--accent-orange), var(--primary-green));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
        }
        .profile-avatar .avatar i {
            font-size: 2.5rem;
            color: white;
        }
        .profile-avatar h3 {
            margin-top: 0.8rem;
            color: var(--text-dark);
        }
        .profile-avatar p {
            color: var(--text-muted);
            font-size: 0.85rem;
        }
        .account-menu {
            margin-top: 1.5rem;
        }
        .menu-item {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            padding: 0.8rem 1rem;
            color: var(--text-dark);
            text-decoration: none;
            border-radius: var(--border-radius);
            margin-bottom: 0.5rem;
            transition: var(--transition);
        }
        .menu-item i {
            width: 24px;
            color: var(--text-muted);
        }
        .menu-item:hover, .menu-item.active {
            background: rgba(255,140,66,0.1);
            color: var(--accent-orange);
        }
        .menu-item:hover i, .menu-item.active i {
            color: var(--accent-orange);
        }
        .account-content {
            background: var(--bg-card);
            border-radius: var(--border-radius-lg);
            padding: 2rem;
            box-shadow: var(--shadow-sm);
        }
        .account-section {
            display: none;
            animation: fadeIn 0.4s ease;
        }
        .account-section.active {
            display: block;
        }
        .section-title {
            color: var(--primary-green-dark);
            margin-bottom: 1.5rem;
            padding-bottom: 0.8rem;
            border-bottom: 2px solid rgba(0,0,0,0.05);
        }
        .profile-field {
            display: flex;
            padding: 0.8rem 0;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        .profile-field .label {
            width: 140px;
            font-weight: 600;
            color: var(--text-dark);
        }
        .profile-field .value {
            color: var(--text-muted);
        }
        .order-card {
            border: 1px solid rgba(0,0,0,0.05);
            border-radius: var(--border-radius);
            padding: 1.2rem;
            margin-bottom: 1rem;
            transition: var(--transition);
        }
        .order-card:hover {
            box-shadow: var(--shadow-sm);
            transform: translateY(-2px);
        }
        .order-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.8rem;
            padding-bottom: 0.8rem;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        .order-id {
            font-weight: 700;
            color: var(--accent-orange);
        }
        .order-status {
            background: #28a74520;
            color: #28a745;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
        }
        .address-card {
            border: 1px solid rgba(0,0,0,0.05);
            border-radius: var(--border-radius);
            padding: 1.2rem;
            margin-bottom: 1rem;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @media (max-width: 768px) {
            .account-wrapper {
                grid-template-columns: 1fr;
            }
            .account-sidebar {
                position: static;
            }
        }
    </style>
</head>
<body>
    <div id="header-placeholder"></div>

    <main>
        <section class="account-header" data-aos="fade-down">
            <div class="container">
                <h1><i class="fas fa-user-circle"></i> My Account</h1>
                <p>Manage your profile, orders and addresses</p>
            </div>
        </section>

        <div class="container">
            <div class="account-wrapper">
                <aside class="account-sidebar" data-aos="fade-right">
                    <div class="profile-avatar">
                        <div class="avatar">
                            <i class="fas fa-user"></i>
                        </div>
                        <h3 id="user-name">Guest User</h3>
                        <p id="user-email"></p>
                    </div>
                    <div class="account-menu">
                        <a href="#" class="menu-item active" data-section="profile"><i class="fas fa-user-circle"></i> Profile</a>
                        <a href="#" class="menu-item" data-section="orders"><i class="fas fa-history"></i> Order History</a>
                        <a href="#" class="menu-item" data-section="addresses"><i class="fas fa-map-marker-alt"></i> Saved Addresses</a>
                        <a href="#" id="logout-btn" class="menu-item"><i class="fas fa-sign-out-alt"></i> Logout</a>
                    </div>
                </aside>
                
                <div class="account-content" data-aos="fade-left">
                    <!-- Profile Section -->
                    <div id="profile-section" class="account-section active">
                        <h3 class="section-title"><i class="fas fa-id-card"></i> Profile Information</h3>
                        <div id="profile-info"></div>
                    </div>
                    
                    <!-- Orders Section -->
                    <div id="orders-section" class="account-section">
                        <h3 class="section-title"><i class="fas fa-truck"></i> Order History</h3>
                        <div id="orders-list"></div>
                    </div>
                    
                    <!-- Addresses Section -->
                    <div id="addresses-section" class="account-section">
                        <h3 class="section-title"><i class="fas fa-location-dot"></i> Saved Addresses</h3>
                        <div id="addresses-list"></div>
                        <button class="btn btn-outline" onclick="addNewAddress()" style="margin-top: 1rem;">
                            <i class="fas fa-plus"></i> Add New Address
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
